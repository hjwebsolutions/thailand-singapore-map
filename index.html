<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thailand + Singapore 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@600&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',-apple-system,sans-serif;overflow:hidden;background:#0f0e0b}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;padding:0 16px;height:56px;
  background:rgba(15,14,11,0.97);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);z-index:300;
  position:relative;gap:10px;flex-shrink:0;
}
.trip-brand{flex-shrink:0}
.trip-title{font-family:'Playfair Display',serif;font-size:15px;color:#f0ede6;letter-spacing:0.01em}
.trip-sub{font-size:10px;color:#6b6860;margin-top:1px;letter-spacing:0.04em}
.pills{display:flex;gap:4px;overflow-x:auto;flex:1;padding:0 4px}
.pills::-webkit-scrollbar{display:none}
.pill{
  padding:5px 12px;border-radius:99px;font-size:11px;font-weight:500;
  cursor:pointer;border:1.5px solid transparent;white-space:nowrap;
  transition:all 0.2s;flex-shrink:0;letter-spacing:0.02em;
}
.pill.active{box-shadow:0 0 0 2px rgba(255,255,255,0.15),0 0 0 4px var(--c)}
.topbtn{
  padding:6px 13px;border-radius:8px;font-size:11px;font-weight:500;
  cursor:pointer;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);color:#b0ada6;
  white-space:nowrap;flex-shrink:0;transition:all 0.15s;font-family:'DM Sans',sans-serif;
  letter-spacing:0.03em;
}
.topbtn:hover{background:rgba(255,255,255,0.1);color:#f0ede6}
.topbtn.on{background:#7B68C8;color:#fff;border-color:#7B68C8}

/* ── ROUTE BAR ── */
.route-bar{
  display:flex;align-items:center;height:34px;padding:0 16px;
  background:rgba(10,9,7,0.95);border-bottom:1px solid rgba(255,255,255,0.06);
  overflow-x:auto;gap:0;flex-shrink:0;
}
.route-bar::-webkit-scrollbar{display:none}
.rb-stop{display:flex;align-items:center;gap:4px;cursor:pointer;padding:0 2px}
.rb-dot{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0;transition:transform 0.15s}
.rb-dot:hover{transform:scale(1.2)}
.rb-name{font-size:10px;font-weight:500;white-space:nowrap;padding:0 4px;letter-spacing:0.02em;transition:color 0.15s}
.rb-seg{font-size:13px;color:rgba(255,255,255,0.2);padding:0 4px;flex-shrink:0}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100vh - 90px)}
#map{flex:1}

/* ── SIDE PANEL ── */
.side{
  width:350px;flex-shrink:0;
  background:rgba(12,11,9,0.98);
  border-left:1px solid rgba(255,255,255,0.07);
  display:flex;flex-direction:column;overflow:hidden;
}
.side-placeholder{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;padding:28px;text-align:center;
}
.sp-icon{font-size:40px;opacity:0.6}
.sp-title{font-family:'Playfair Display',serif;font-size:18px;color:#f0ede6}
.sp-text{font-size:12px;line-height:1.65;color:#6b6860}

.side-hdr{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.sh-row{display:flex;align-items:center;gap:9px}
.sh-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sh-city{font-family:'Playfair Display',serif;font-size:18px;color:#f0ede6}
.sh-country{font-size:11px;color:rgba(255,255,255,0.3);margin-left:2px;font-weight:300}
.sh-meta{font-size:10px;color:#6b6860;margin-top:3px;margin-left:35px;letter-spacing:0.03em}
.sh-meta a{color:#7B9CD4;text-decoration:none}
.sh-meta a:hover{text-decoration:underline}
.sh-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px;margin-left:35px}
.stag{font-size:9px;font-weight:600;padding:2px 8px;border-radius:99px;letter-spacing:0.04em}

.side-transport{
  padding:10px 16px;background:rgba(255,255,255,0.03);
  border-bottom:1px solid rgba(255,255,255,0.06);
  font-size:10.5px;color:#8a8780;line-height:1.6;flex-shrink:0;
}
.side-transport b{color:#c0bdb6}
.side-transport a{color:#7B9CD4;text-decoration:none}
.side-transport a:hover{text-decoration:underline}

.attr-scroll{flex:1;overflow-y:auto}
.attr-scroll::-webkit-scrollbar{width:3px}
.attr-scroll::-webkit-scrollbar-track{background:transparent}
.attr-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.sec-title{
  padding:8px 16px 4px;font-size:9px;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;color:rgba(255,255,255,0.25);
  position:sticky;top:0;background:rgba(12,11,9,0.98);z-index:2;
}

.acard{
  display:flex;gap:10px;padding:10px 14px 10px 12px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;transition:background 0.1s;
  border-left:3px solid transparent;align-items:flex-start;
}
.acard:hover{background:rgba(255,255,255,0.03)}
.acard.active{background:rgba(123,104,200,0.12);border-left-color:#7B68C8}
.ac-num{
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;color:#fff;flex-shrink:0;margin-top:2px;
}
.ac-thumb-wrap{width:64px;height:52px;border-radius:7px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,0.05);position:relative}
.ac-thumb{width:100%;height:100%;object-fit:cover;display:block}
.ac-info{flex:1;min-width:0}
.ac-name{font-size:11.5px;font-weight:600;color:#e8e5de;line-height:1.25;letter-spacing:0.01em}
.ac-type{font-size:9.5px;color:#5a5855;margin-top:1px}
.ac-day{font-size:9.5px;font-weight:700;margin-top:2px;letter-spacing:0.02em}
.ac-stars{font-size:9.5px;color:#BA7517;margin-top:1px}
.ac-links{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.acl{font-size:9.5px;padding:2px 8px;border-radius:5px;text-decoration:none;font-weight:600;transition:opacity 0.15s}
.acl:hover{opacity:0.8}
.acl-g{background:rgba(24,95,165,0.25);color:#7B9CD4}
.acl-b{background:rgba(15,110,86,0.25);color:#4DB896}

/* ── INFO WINDOW ── */
.iw{font-family:'DM Sans',sans-serif;width:280px;border-radius:12px;overflow:hidden;background:#1a1916}
.iw-carousel{position:relative;width:280px;height:165px;overflow:hidden;background:#111}
.iw-track{display:flex;height:165px;transition:transform 0.35s cubic-bezier(.4,0,.2,1)}
.iw-slide{width:280px;height:165px;flex-shrink:0;position:relative}
.iw-img{width:100%;height:165px;object-fit:cover;display:block}
.iw-img-placeholder{width:280px;height:165px;display:flex;align-items:center;justify-content:center;background:#1a1916;color:rgba(255,255,255,0.15);font-size:11px}

/* Arrow buttons */
.iw-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:300;line-height:1;
  transition:background 0.15s;z-index:10;
  user-select:none;
}
.iw-arrow:hover{background:rgba(0,0,0,0.85)}
.iw-prev{left:8px}
.iw-next{right:8px}

.iw-counter{
  position:absolute;bottom:8px;right:10px;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);
  color:rgba(255,255,255,0.85);font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:99px;z-index:5;
  font-family:'DM Sans',sans-serif;
}
.iw-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:5}
.iw-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.35);cursor:pointer;transition:background 0.15s}
.iw-dot.on{background:#fff}

.iw-body{padding:11px 13px 13px}
.iw-name{font-size:13.5px;font-weight:700;color:#f0ede6;margin-bottom:2px;line-height:1.25;font-family:'DM Sans',sans-serif}
.iw-meta{font-size:10px;color:#5a5855;margin-bottom:2px}
.iw-day{font-size:10px;font-weight:700;color:#9B8CD8;margin-bottom:3px}
.iw-stars{font-size:10.5px;color:#BA7517;margin-bottom:6px}
.iw-desc{font-size:10.5px;color:#8a8780;line-height:1.55;margin-bottom:9px}
.iw-btns{display:flex;gap:6px}
.iw-btn{
  flex:1;text-align:center;font-size:11px;font-weight:700;
  padding:7px 8px;border-radius:8px;text-decoration:none;
  letter-spacing:0.02em;transition:opacity 0.15s;font-family:'DM Sans',sans-serif;
}
.iw-btn:hover{opacity:0.85}
.iw-gm{background:#185FA5;color:#fff}
.iw-bk{background:#0F6E56;color:#fff}

/* override Google Maps info window chrome */
.gm-style .gm-style-iw-c{padding:0!important;border-radius:12px!important;background:#1a1916!important;box-shadow:0 8px 40px rgba(0,0,0,0.6)!important}
.gm-style .gm-style-iw-d{overflow:hidden!important;padding:0!important}
.gm-style .gm-style-iw-chr{display:none!important}
.gm-style .gm-style-iw-t::after{background:#1a1916!important}
</style>
</head>

  <div class="trip-brand">

  </div>
  <div class="pills" id="pills"></div>

  <button class="topbtn" id="btnWalk" onclick="toggleDirections()">Directions</button>
</div>
<div class="route-bar" id="routeBar"></div>

<div class="layout">

    </div>
    <div id="sideMain" style="display:none;flex-direction:column;flex:1;overflow:hidden"></div>
  </div>
</div>

      {name:'Wat Pho — Reclining Buddha',placeId:'ChIJmaPD7i6Z4jARf0QKa2FrGhc',type:'Buddhist Temple',day:'Dec 14 — 10:30',rating:'4.8★ (7,945)',lat:13.7465,lng:100.4927,mapsUrl:'https://maps.google.com/?cid=7705533375476916128',bookUrl:'https://watpomassage.com',desc:'46m gold Reclining Buddha — Thailand\'s most famous temple. Oldest public university of traditional medicine. Get a 30-min Thai massage at the school on site (~$10). 200 THB entry. 8 min walk south from Grand Palace.'},
      {name:'Wat Arun Ratchawararam',placeId:'ChIJaSv_6gaZ4jARnbiUVn6Z_YY',type:'Buddhist Temple',day:'Dec 14 — 14:00',rating:'4.7★ (44,239)',lat:13.7439,lng:100.4884,mapsUrl:'https://maps.google.com/?cid=13729523753940879764',bookUrl:null,desc:'Temple of Dawn — porcelain-encrusted riverside prang. Cross the Chao Phraya by ferry from Tha Tien pier (4 THB, 3 min). Best in late afternoon golden light. 100 THB. Wat Phra That Phra Wanram is adjacent.'},
      {name:'The Deck by Arun Residence',placeId:'ChIJXW-7kH462jARZ0ObpXBi1Jg',type:'Restaurant — Riverside Terrace',day:'Dec 14 — 12:30 (lunch)',rating:'4.4★ (3,535)',lat:13.7446,lng:100.4890,mapsUrl:'https://maps.google.com/?q=The+Deck+by+Arun+Residence+Bangkok',bookUrl:null,desc:'Rooftop terrace with direct Grand Palace view across the Chao Phraya. $$$. Fusion menu. Reserve ahead — the view is unbeatable for lunch between Wat Pho and Wat Arun.'},

      {name:'Chatuchak Weekend Market',placeId:'ChIJ3fiD6BSc4jARS324hNeR8ZE',type:'Market (Sat–Sun only)',day:'Dec 14 — 15:00',rating:'4.4★ (55,419)',lat:13.7998,lng:100.5504,mapsUrl:'https://maps.google.com/?cid=8440027765490052243',bookUrl:null,desc:'World\'s largest weekend market — 35 acres, 15,000 stalls. Open Sat–Sun 9am–6pm. Clothes, antiques, street food, plants, art. Best visited 15:00–18:00 when it\'s cooler and less packed. Take MRT to Chatuchak Park.'},

    attrs:[
      {name:'Cheow Lan Lake — Floating Bungalows',placeId:'ChIJ99wwYGg2UTAR9cI8eds2OhQ',type:'Floating Bungalows (2 nights)',day:'Dec 17–19',rating:'4.7★ (409)',lat:8.9766,lng:98.8044,mapsUrl:'https://maps.google.com/?q=Cheow+Lan+Lake+Khao+Sok',bookUrl:'https://panvaree.com',desc:'Emerald lake ringed by 400m limestone karsts — Jurassic Park scenery. Book Panvaree or Greenview Resort. Floating bungalows directly on the water — wake up to mist rising off the lake. December peak season fills months in advance.'},
      {name:'Khao Sok National Park',placeId:'ChIJX5d1Mn4oUTARMK0fzC4Xf44',type:'Rainforest & Jungle',day:'Dec 17–19',rating:'4.7★ (8,656)',lat:8.9020,lng:98.5310,mapsUrl:'https://maps.google.com/?cid=10267951165188582704',bookUrl:null,desc:'160-million-year-old rainforest — older than the Amazon. Guided jungle hike (half-day, arrange through bungalow), wildlife spotting (gibbons, hornbills, monitor lizards), cave exploration, night safari with ranger. 300 THB park entry.'},
      {name:'Coral Cave Exploration',placeId:'ChIJJ970f4FIUTARF0JM-oWEq7U',type:'Cave Tour',day:'Dec 17 afternoon',rating:'4.3★',lat:8.9158,lng:98.8864,mapsUrl:'https://maps.google.com/?q=Coral+Cave+Khao+Sok',bookUrl:null,desc:'Accessible by short boat + 20-min jungle walk from bungalows. Stalactites and stalagmites deep in the karst. Best done Day 1 afternoon after check-in. Arrange through bungalow operator. Bring headlamp.'},
      {name:'Night Safari — Khao Sok',placeId:'ChIJX5d1Mn4oUTARMK0fzC4Xf44',type:'Wildlife Night Walk',day:'Dec 17 evening (~20:00)',rating:'4.7★',lat:8.9100,lng:98.5350,mapsUrl:'https://maps.google.com/?q=Khao+Sok+National+Park',bookUrl:null,desc:'Spotlighting for nocturnal wildlife with a ranger along jungle trails — best experience of the Khao Sok stay. Gibbons, flying squirrels, snakes, insects. Book through national park or bungalow. ~2 hrs.'},
      {name:'Dawn on Cheow Lan Lake',placeId:'ChIJ99wwYGg2UTAR9cI8eds2OhQ',type:'Photography + Kayaking',day:'Dec 18 — 05:30',rating:'4.9★ (photographers say)',lat:8.9800,lng:98.8100,mapsUrl:'https://maps.google.com/?q=Cheow+Lan+Lake',bookUrl:null,desc:'Set alarm for 05:30. Mist rising off the emerald lake against limestone karst cliffs at dawn — the best photograph of the entire trip. Rent a kayak from the bungalow and paddle out in complete silence before anyone else wakes up.'},

      {name:'EDC Thailand — Rhythm Park',placeId:'ChIJ8Tyhv283UDAR8c0BlLHC9EY',type:'Music Festival (Dec 20)',day:'Dec 20 — gates 15:00',rating:'4.6★ (48)',lat:8.0052,lng:98.3130,mapsUrl:'https://maps.google.com/?q=Rhythm+Park+Laguna+Phuket',bookUrl:'https://thailand.electricdaisycarnival.com/en/',desc:'Electric Daisy Carnival 2026 — 3rd edition. Dec 18–20 at Rhythm Park, Laguna Phuket. Pick Dec 20 (Saturday) for peak energy. GA 1-day pass ~$249 USD. Age 20+, physical passport required at gate. Walk or short shuttle from Laguna Airbnb.'},
      {name:'Old Phuket Town + Thanon Talang',placeId:'ChIJyXu3hvoxUDAR86GPJxPu9G8',type:'Historic District',day:'Dec 19 afternoon + Dec 21',rating:'4.5★',lat:7.8849,lng:98.3876,mapsUrl:'https://maps.google.com/?q=Old+Phuket+Town',bookUrl:null,desc:'Sino-Portuguese pastel shophouses, street murals, boutique cafés. Walk from Thalang Road south to Dibuk Road. Thanon Talang is the most photogenic street for photos. Raya Restaurant (famous crab curry, $$$) and One Chun Cafe (local Thai-Chinese, $$) are must-eats.'},
      {name:'Raya Restaurant',placeId:'ChIJEe2E-PYxUDARcfOQB3Woa9w',type:'Restaurant — Heritage Shophouse',day:'Dec 19 or 21 dinner',rating:'4.4★ (3,328)',lat:7.8859,lng:98.3909,mapsUrl:'https://maps.google.com/?q=Raya+Restaurant+Phuket',bookUrl:null,desc:'Iconic Old Phuket Town restaurant in a restored Sino-Portuguese shophouse. Famous for crab omelette and Southern Thai crab curry. Book ahead — fills fast. $$-$$$.'},
      {name:'Nai Yang Beach',placeId:'ChIJX2uf05s1UDAROIBBsTjQq1o',type:'Beach',day:'Dec 20 morning (pre-EDC)',rating:'4.4★ (1,230)',lat:8.1644,lng:98.2989,mapsUrl:'https://maps.google.com/?q=Nai+Yang+Beach+Phuket',bookUrl:null,desc:'Closest beach to Laguna/EDC area — just 10 min drive. Quiet, long, local vibe, protected by national park. Great for resting up the morning before EDC. Almost no tourists. Beautiful sunsets.'},
      {name:'Freedom Beach',placeId:'ChIJ4S3VTuIkUDAR3mKUwV8K1Ks',type:'Secluded Beach',day:'Dec 21 morning',rating:'4.4★ (10,673)',lat:7.8938,lng:98.2792,mapsUrl:'https://maps.google.com/?q=Freedom+Beach+Phuket',bookUrl:null,desc:'Phuket\'s most beautiful hidden beach. Accessible by longtail boat from Patong (~100 THB, 15 min) or 20-min hike. Crystal clear water, soft sand, no jet skis. Go in the morning for calm water and fewer people.'},
      {name:'Kamala Beach',placeId:'ChIJU6_SgWcwUDAR6BXy4ZRZXQQ',type:'Beach',day:'Dec 19 evening / Dec 21',rating:'4.4★ (3,796)',lat:7.9440,lng:98.2816,mapsUrl:'https://maps.google.com/?q=Kamala+Beach+Phuket',bookUrl:null,desc:'Relaxed, beautiful crescent beach 20 min from Laguna. Good base beach. Carnival Magic theme park is nearby. Less crowded than Patong. Good sunset drinks restaurants along the strip.'},
      {name:'Karon Beach',placeId:'ChIJ1SemHHIlUDARH2WofLMBaOQ',type:'Beach',day:'Dec 21 afternoon',rating:'4.6★ (9,136)',lat:7.8439,lng:98.2936,mapsUrl:'https://maps.google.com/?q=Karon+Beach+Phuket',bookUrl:null,desc:'Wide, clean, less crowded than Patong. Great swimming, beautiful long stretch. Kata Beach is just south for surf. The lunch restaurants along Karon strip are excellent value.'},
      {name:'Promthep Cape + Windmill Viewpoint',placeId:'ChIJtZgCJiEmUDARG1q53LLQaAs',type:'Sunset Viewpoints',day:'Dec 21 — 17:00',rating:'4.7★ (18,216)',lat:7.7618,lng:98.3053,mapsUrl:'https://maps.google.com/?cid=9871866988162636315',bookUrl:null,desc:'Southern tip of Phuket — best sunset on the island. 270° panoramic Andaman Sea views. Arrive 30 min before sunset. Windmill Viewpoint is 2km north and less crowded with similar views. Both in the same Grab trip. Dinner at Nai Harn Beach below after.'},
      {name:'Big Buddha Phuket',placeId:'ChIJ0W1qdZsxUDARiL2pCKfqkXc',type:'Landmark',day:'Dec 21 — 15:00',rating:'4.6★ (38,269)',lat:7.8274,lng:98.3128,mapsUrl:'https://maps.google.com/?q=Big+Buddha+Phuket',bookUrl:null,desc:'45m white marble Buddha statue on Nakkerd Hill. Free entry. Panoramic views of both the Andaman Sea and Chalong Bay simultaneously. Take Grab (~150 THB). On the way to Promthep Cape — do both in the same afternoon.'},
      {name:'Phi Phi Islands + Maya Bay',placeId:'ChIJDT1Odr4gTjARcZ9UGni4nb8',type:'Speedboat Day Trip',day:'Dec 22 — depart 07:00',rating:'4.6★ (7,498)',lat:7.7407,lng:98.7784,mapsUrl:'https://maps.google.com/?cid=13807394858565148529',bookUrl:'https://www.viator.com/en-US/tours/Phuket/Phi-Phi-Islands-and-Maya-Bay-Speedboat-Day-Trip/d343-3428PHIPHI',desc:'Depart Rassada Pier 07:00 to beat crowds at Maya Bay. Phi Phi viewpoints hike (20 min, best photo of day), Maya Bay ("The Beach"), snorkeling at Pi Leh Bay + Ko Hong + Chicken Rock. Tour includes snorkel gear + guide. ~$70/person via Viator. Returns ~17:00.'},
      {name:'Phang Nga Bay — James Bond Island',placeId:'ChIJ8QtsYcOsUTARY16P2GPh_RM',type:'Full Day Boat Tour',day:'Dec 23 — depart 08:00',rating:'4.6★ (836)',lat:8.2745,lng:98.5012,mapsUrl:'https://maps.google.com/?q=James+Bond+Island+Phang+Nga',bookUrl:'https://www.viator.com/en-US/tours/Phuket/Phang-Nga-Bay-and-James-Bond-Island-Day-Trip/d343-5391P12',desc:'Khao Phing Kan (James Bond Island) from "The Man with the Golden Gun". Sea cave kayaking through hidden hongs, Ko Hong Phang Nga, Ko Panyi floating village lunch, View Point Hong Island. ~$50/person via Viator. Returns ~17:00.'},
      {name:'Patong Beach + Bangla Walking Street',placeId:'ChIJCwgz2sUkUDAR_6qZy8OVKEA',type:'Beach + Nightlife',day:'Dec 19 evening / optional',rating:'4.3★ (6,123)',lat:7.8990,lng:98.2963,mapsUrl:'https://maps.google.com/?q=Bangla+Walking+Street+Phuket',bookUrl:null,desc:'Phuket\'s main nightlife strip. Bangla Road is wall-to-wall bars and clubs from sundown. Go once for the experience — it\'s an institution. Good EDC warm-up energy. Illuzion Phuket nightclub (EDC-adjacent) is on this strip if energy allows post-festival.'},

      {name:'Elephant Nature Park',placeId:'ChIJc8S16aE62jARUXKBvK2Xu8I',type:'Ethical Elephant Sanctuary — Full Day',day:'Dec 25 (Christmas Day)',rating:'4.5★ (599)',lat:19.0820,lng:98.8575,mapsUrl:'https://maps.google.com/?q=Elephant+Nature+Park+Chiang+Mai',bookUrl:'https://www.elephantnaturepark.org',desc:'Thailand\'s most respected ethical sanctuary. 116 rescued elephants — feed, walk alongside, watch river bathing. NO riding. ~$80/person. Pickup from hotel 08:30, returns 17:00 including transport and lunch. Book direct — fills weeks out in December.'},
      {name:'Wat Phra That Doi Suthep',placeId:'ChIJtd3x37U52jARIX7FrlxMhp0',type:'Sacred Mountain Temple',day:'Dec 24 — 16:00 (sunset)',rating:'4.7★ (11,698)',lat:18.8050,lng:98.9216,mapsUrl:'https://maps.google.com/?cid=12285090148386524575',bookUrl:null,desc:'Sacred mountain temple 15km from city. 306 Naga staircase steps (or tram available). Golden chedi + panoramic Chiang Mai valley views. 30 THB entry. Christmas Eve here has a special atmosphere — Buddhist significance aligns with the festive season.'},

      {name:'Wat Chedi Luang',placeId:'ChIJFRQRM5k62jARuqhLBJpw91w',type:'Ancient Temple — Old City',day:'Dec 24–26 evenings',rating:'4.7★ (17,987)',lat:18.7870,lng:98.9866,mapsUrl:'https://maps.google.com/?q=Wat+Chedi+Luang+Chiang+Mai',bookUrl:null,desc:'14th-century giant ruined chedi inside the Old City walls. Elephant statues on four corners. Illuminated at night — beautiful. 50 THB. Part of the Old City walking loop. Monks available for informal chats about Buddhism most evenings.'},
      {name:'Wat Phra Singh',placeId:'ChIJbyRKbps62jAR6VTNF-fZVpY',type:'Buddhist Temple — Old City',day:'Dec 24–26',rating:'4.7★ (17,326)',lat:18.7885,lng:98.9820,mapsUrl:'https://maps.google.com/?q=Wat+Phra+Singh+Chiang+Mai',bookUrl:null,desc:'Most important Lanna-style temple in Chiang Mai. Houses the revered Phra Singh Buddha. Intricate wood carvings and gilded structures. Free entry. 5-min walk west from Wat Chedi Luang — both are in the Old City walking loop.'},
      {name:'Wat Lok Moli',placeId:'ChIJbyRKbps62jAR6VTNF-fZVpY',type:'Buddhist Temple',day:'Dec 24–26',rating:'4.7★',lat:18.7930,lng:98.9858,mapsUrl:'https://maps.google.com/?q=Wat+Lok+Moli+Chiang+Mai',bookUrl:null,desc:'Beautiful Lanna-style temple just inside the north moat. Less visited than Wat Chedi Luang and Wat Phra Singh — quieter and more atmospheric. Part of the Old City walking route heading toward Tha Phae Gate.'},
      {name:'Fah Lanna Spa — Old City',placeId:'ChIJf4MRhJ862jAR5R_u1-tX9pE',type:'Heritage Day Spa',day:'Dec 25 — 17:30',rating:'4.5★ (1,855)',lat:18.7880,lng:98.9824,mapsUrl:'https://maps.google.com/?q=Fah+Lanna+Spa+Chiang+Mai',bookUrl:'https://www.fahlannaspa.com',desc:'Top-rated Lanna heritage spa inside a restored colonial mansion in the Old City walls. Traditional Thai massage, herbal body treatments, facial. Book the 18:00 slot for Dec 25 — perfect recovery after Elephant Nature Park. Book ahead at fahlannaspa.com.'},
      {name:'Chiang Mai Night Bazaar',placeId:'ChIJW0qnDKY62jARHbAmfwD1Lgs',type:'Night Market — Every Night',day:'Dec 24–26 evenings',rating:'4.3★ (26,688)',lat:18.7852,lng:99.0003,mapsUrl:'https://maps.google.com/?q=Chiang+Mai+Night+Bazaar',bookUrl:null,desc:'Nightly market on Changklan Road. Handcrafts, local art, clothing, street food, live music. Best after 7pm. Christmas Eve is especially festive with decorations and street performers. Every night — no Sat/Sun restriction like Tha Phae Walking Street.'},
      {name:'Wat Rong Khun — White Temple',placeId:'ChIJD5RZzt-31zARo7esjg3V_Co',type:'Day Trip to Chiang Rai (~3 hrs)',day:'Dec 26 — 10:30',rating:'4.6★ (24,856)',lat:19.8233,lng:99.7627,mapsUrl:'https://maps.google.com/?cid=15804765427839541188',bookUrl:'https://www.viator.com/en-US/tours/Chiang-Mai/Chiang-Rai-and-Golden-Triangle-Day-Trip-from-Chiang-Mai/d5422-6116P11',desc:'Wat Rong Khun — entirely white + mirrored glass exterior. Unlike any temple in Asia. Surreal contemporary Buddhist art installation. Guided day tour from Chiang Mai also covers Black House + Blue Temple + Golden Triangle. ~$35–45/person via Viator.'},
      {name:'Baan Dam — Black House (Chiang Rai)',placeId:'ChIJAQAAAFAA1zARlrvp9yTMeoE',type:'Day Trip to Chiang Rai',day:'Dec 26 — 12:30',rating:'4.1★ (13,631)',lat:19.9920,lng:99.8608,mapsUrl:'https://maps.google.com/?cid=8823040820578475009',bookUrl:null,desc:'40+ dark wooden buildings by Thai National Artist Thawan Duchanee. Skulls, animal hides, bones — dark arts complex that is the eerie counterpoint to the White Temple. The contrast between the two makes the day.'},
      {name:'Golden Triangle + Blue Temple',placeId:'ChIJMQ7WcjVD1jART37Y-tgYjmg',type:'Day Trip to Chiang Rai',day:'Dec 26 — 14:30',rating:'4.3★ (16,634)',lat:20.3529,lng:100.0830,mapsUrl:'https://maps.google.com/?q=Golden+Triangle+Chiang+Rai',bookUrl:null,desc:'Where Thailand, Laos, and Myanmar meet at the Mekong River. Historic opium trade crossroads. Boat tours available. Blue Temple (Rong Suea Ten) — electric blue and gold interior — is en route back to Chiang Mai. Mae Kachan Hot Spring also on this route (~200 THB soak).'},

// ═══════════════════════════════════════
// GOOGLE MAPS + DIRECTIONS SETUP
// ═══════════════════════════════════════
let map, placesService, infoWindow, directionsService, directionsRenderer;
let stopMarkers=[], attrMarkers=[], currentStop=null, isSat=false, dirOn=false;
const OV={lat:10.5, lng:100.5};

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center:OV, zoom:5,
    mapTypeId:'roadmap',
    mapTypeControl:false, streetViewControl:false, fullscreenControl:true,
    zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_BOTTOM},
    styles:[
      // Clean, dark-tinted map — NO highlighted roads, no POI clutter
      {featureType:'all',elementType:'geometry',stylers:[{color:'#1a1916'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#0d2b3e'}]},
      {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#526e7e'}]},
      {featureType:'landscape',elementType:'geometry',stylers:[{color:'#1f1e1a'}]},
      {featureType:'landscape.natural',elementType:'geometry',stylers:[{color:'#1a2514'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#2a2825'}]},
      {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#1a1916'}]},
      {featureType:'road',elementType:'labels.text.fill',stylers:[{color:'#8a8780'}]},
      {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#3a3630'}]},
      {featureType:'road.highway',elementType:'labels.text.fill',stylers:[{color:'#9a9790'}]},
      {featureType:'poi',elementType:'all',stylers:[{visibility:'off'}]},
      {featureType:'poi.park',elementType:'geometry',stylers:[{color:'#1a2514'}]},
      {featureType:'transit',elementType:'all',stylers:[{visibility:'off'}]},
      {featureType:'administrative',elementType:'geometry',stylers:[{color:'#3a3630'}]},
      {featureType:'administrative',elementType:'labels.text.fill',stylers:[{color:'#7a7870'}]},
      {featureType:'administrative.country',elementType:'geometry.stroke',stylers:[{color:'#4a4840'}]},
    ]
  });

  placesService = new google.maps.places.PlacesService(map);
  infoWindow = new google.maps.InfoWindow({maxWidth:280, disableAutoPan:false});
  directionsService = new google.maps.DirectionsService();
  directionsRenderer = new google.maps.DirectionsRenderer({
    suppressMarkers:true,
    polylineOptions:{
      strokeColor:'#7B68C8',
      strokeWeight:4,
      strokeOpacity:0.85,
    }
  });
  directionsRenderer.setMap(map);

  buildUI();
  drawRoutePaths();
  drawStops();
}

// ═══════════════════════════════════════
// ROUTE PATHS — flight arcs + van paths
// (NO blue road overlay — just route arcs between stops)
// ═══════════════════════════════════════
function drawRoutePaths() {
  const segs = [
    {from:{lat:13.7563,lng:100.5018}, to:{lat:8.9177,lng:98.5278}, type:'train', color:'#E8A040'},
    {from:{lat:8.9177,lng:98.5278},  to:{lat:7.9519,lng:98.3381},  type:'van',   color:'#aaa'},
    {from:{lat:7.9519,lng:98.3381},  to:{lat:18.7883,lng:98.9853}, type:'flight', color:'#7B9CD4'},
    {from:{lat:18.7883,lng:98.9853}, to:{lat:19.1156,lng:98.7108}, type:'van',   color:'#aaa'},
    {from:{lat:19.1156,lng:98.7108}, to:{lat:1.3521,lng:103.8198}, type:'flight', color:'#7B9CD4'},
  ];
  segs.forEach(s => {
    const dashed = s.type !== 'van';
    new google.maps.Polyline({
      path:[s.from, s.to], map,
      strokeColor: s.color,
      strokeOpacity: dashed ? 0 : 0.5,
      strokeWeight: 2,
      icons: dashed ? [{
        icon:{path:'M 0,-1 0,1', strokeOpacity:0.65, scale: s.type==='flight'?3.5:2.5},
        offset:'0', repeat: s.type==='flight'?'22px':'12px'
      }] : []
    });
  });
  // Day trips
  [{from:{lat:7.9519,lng:98.3381},to:{lat:7.7407,lng:98.7784}},
   {from:{lat:18.7883,lng:98.9853},to:{lat:19.8233,lng:99.7627}}].forEach(d=>{
    new google.maps.Polyline({path:[d.from,d.to],map,strokeColor:'#BA7517',strokeOpacity:0,strokeWeight:1.5,
      icons:[{icon:{path:'M 0,-1 0,1',strokeOpacity:.55,scale:2},offset:'0',repeat:'9px'}]});
  });
}

// ═══════════════════════════════════════
// WALKING DIRECTIONS
// Uses Google Maps Directions API for actual street-level walking routes
// ═══════════════════════════════════════
let currentDirRoute = null;

function showWalkingDirections(stop) {
  clearDirections();
  if (!stop.walkPath || stop.walkPath.length < 2) return;
  const waypts = stop.walkPath.slice(1,-1).map(p=>({location:p, stopover:false}));
  directionsService.route({
    origin: stop.walkPath[0],
    destination: stop.walkPath[stop.walkPath.length-1],
    waypoints: waypts,
    travelMode: google.maps.TravelMode.WALKING,
  }, (result, status) => {
    if (status === google.maps.DirectionsStatus.OK) {
      directionsRenderer.setDirections(result);
      currentDirRoute = result;
    }
  });
}

function clearDirections() {
  directionsRenderer.setDirections({routes:[]});
  currentDirRoute = null;
}

// ═══════════════════════════════════════
// STOP MARKERS
// ═══════════════════════════════════════
function mkStopSvg(s, sel) {
  const r=sel?20:17, d=r*2+16;
  return {
    url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="${d}" height="${d+10}" viewBox="0 0 ${d} ${d+10}">
        <defs>
          <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="${s.color}" flood-opacity="0.5"/></filter>
        </defs>
        <circle cx="${r+8}" cy="${r+8}" r="${r}" fill="${sel?s.color+'33':'#1a1916'}" stroke="${s.color}" stroke-width="${sel?2.5:1.5}" filter="url(#sh)"/>
        <circle cx="${r+8}" cy="${r+8}" r="${sel?11:9}" fill="${s.color}"/>
        <text x="${r+8}" y="${r+12}" text-anchor="middle" font-size="${sel?12:10}" font-weight="800" fill="white" font-family="DM Sans,Arial">${s.num}</text>
        <polygon points="${r+8},${d+8} ${r+2},${d} ${r+14},${d}" fill="${s.color}"/>
      </svg>`),
    scaledSize:new google.maps.Size(d,d+10),
    anchor:new google.maps.Point(r+8,d+8)
  };
}

function drawStops() {
  STOPS.forEach((s,i)=>{
    const m=new google.maps.Marker({position:{lat:s.lat,lng:s.lng},map,icon:mkStopSvg(s,false),title:s.name,zIndex:100});
    m.addListener('click',()=>selectStop(s.id));
    stopMarkers.push(m);
  });
}

// ═══════════════════════════════════════
// ATTRACTION MARKERS
// ═══════════════════════════════════════
function mkAttrSvg(color,n) {
  return {
    url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
        <defs><filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity=".5"/></filter></defs>
        <circle cx="16" cy="16" r="13" fill="${color}" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" filter="url(#sh)"/>
        <text x="16" y="21" text-anchor="middle" font-size="11" font-weight="800" fill="white" font-family="DM Sans,Arial">${n}</text>
      </svg>`),
    scaledSize:new google.maps.Size(32,32), anchor:new google.maps.Point(16,16)
  };
}

function showAttrMarkers(stop) {
  clearAttrMarkers();
  stop.attrs.forEach((a,i)=>{
    const m=new google.maps.Marker({position:{lat:a.lat,lng:a.lng},map,icon:mkAttrSvg(stop.color,i+1),title:a.name,zIndex:200});
    m.addListener('click',()=>{selectAttr(i); openIW(m,a,stop);});
    attrMarkers.push(m);
  });
}

function clearAttrMarkers(){attrMarkers.forEach(m=>m.setMap(null));attrMarkers=[];infoWindow.close();}

// ═══════════════════════════════════════
// INFO WINDOW — PHOTO CAROUSEL
// Fetches real photos via Places API
// ═══════════════════════════════════════
const photoCache={};

function openIW(marker, attr, stop) {
  // Loading state
  infoWindow.setContent(buildIWLoading(attr));
  infoWindow.open(map,marker);

  if (photoCache[attr.placeId]) {
    buildIWFull(attr, stop, marker, photoCache[attr.placeId]);
    return;
  }
  placesService.getDetails({placeId:attr.placeId, fields:['photos']}, (r,s)=>{
    let urls=[];
    if (s===google.maps.places.PlacesServiceStatus.OK && r?.photos?.length) {
      urls = r.photos.slice(0,7).map(p=>p.getUrl({maxWidth:560,maxHeight:330}));
    }
    photoCache[attr.placeId]=urls;
    buildIWFull(attr, stop, marker, urls);
  });
}

function buildIWLoading(attr) {
  return `<div class="iw"><div style="width:280px;height:165px;background:#111;display:flex;align-items:center;justify-content:center"><span style="color:rgba(255,255,255,0.2);font-size:11px;font-family:DM Sans,sans-serif">Loading photos…</span></div><div class="iw-body"><div class="iw-name">${attr.name}</div><div class="iw-day">${attr.day}</div></div></div>`;
}

function buildIWFull(attr, stop, marker, urls) {
  const id='iw'+Date.now();
  const total=urls.length;

  const slides = total>0
    ? urls.map((u,i)=>`<div class="iw-slide"><img class="iw-img" src="${u}" alt="${attr.name} photo ${i+1}" loading="lazy"></div>`).join('')
    : `<div class="iw-slide"><div class="iw-img-placeholder">${attr.name}</div></div>`;

  const dots = total>1 ? urls.map((_,i)=>`<div class="iw-dot${i===0?' on':''}" onclick="iwGoTo('${id}',${i})"></div>`).join('') : '';
  const counter = total>1 ? `<div class="iw-counter" id="ctr_${id}">1 / ${total}</div>` : '';
  const arrows = total>1 ? `
    <button class="iw-arrow iw-prev" onclick="iwStep('${id}',-1,${total})">‹</button>
    <button class="iw-arrow iw-next" onclick="iwStep('${id}',1,${total})">›</button>` : '';
  const dotsHtml = dots ? `<div class="iw-dots" id="dots_${id}">${dots}</div>` : '';

  const bkBtn = attr.bookUrl ? `<a href="${attr.bookUrl}" target="_blank" class="iw-btn iw-bk">🎟 Book / Info</a>` : '';

  const html=`<div class="iw">
    <div class="iw-carousel">
      <div class="iw-track" id="trk_${id}">${slides}</div>
      ${arrows}${counter}${dotsHtml}
    </div>
    <div class="iw-body">
      <div class="iw-name">${attr.name}</div>
      <div class="iw-meta">${attr.type}</div>
      <div class="iw-day">${attr.day}</div>
      <div class="iw-stars">${attr.rating}</div>
      <div class="iw-desc">${attr.desc}</div>
      <div class="iw-btns">
        <a href="${attr.mapsUrl}" target="_blank" class="iw-btn iw-gm">📍 Google Maps</a>
        ${bkBtn}
      </div>
    </div>
  </div>`;
  infoWindow.setContent(html);
  infoWindow.open(map,marker);
}

// Carousel controls (global — called from inline onclick in info window)
let iwCurrent={};
window.iwStep=function(id,dir,total){
  const cur=(iwCurrent[id]||0);
  const next=(cur+dir+total)%total;
  iwGoTo(id,next);
};
window.iwGoTo=function(id,idx){
  iwCurrent[id]=idx;
  const trk=document.getElementById('trk_'+id);
  const ctr=document.getElementById('ctr_'+id);
  const dotsCont=document.getElementById('dots_'+id);
  if(trk)trk.style.transform=`translateX(-${idx*280}px)`;
  if(ctr){const t=trk?trk.children.length:1;ctr.textContent=`${idx+1} / ${t}`;}
  if(dotsCont){dotsCont.querySelectorAll('.iw-dot').forEach((d,i)=>d.classList.toggle('on',i===idx));}
};

// Fetch thumbnail for side panel card
const thumbCache={};
function fetchThumb(placeId,imgEl){
  if(thumbCache[placeId]){imgEl.src=thumbCache[placeId];return;}
  placesService.getDetails({placeId,fields:['photos']},(r,s)=>{
    if(s===google.maps.places.PlacesServiceStatus.OK&&r?.photos?.length){
      const u=r.photos[0].getUrl({maxWidth:128,maxHeight:104});
      thumbCache[placeId]=u; imgEl.src=u;
    }
  });
}

// ═══════════════════════════════════════
// SELECTION
// ═══════════════════════════════════════
function selectStop(id) {
  const stop=STOPS.find(s=>s.id===id); if(!stop)return;
  if(currentStop){
    const pi=STOPS.findIndex(s=>s.id===currentStop.id);
    stopMarkers[pi].setIcon(mkStopSvg(currentStop,false));
  }
  currentStop=stop;
  stopMarkers[STOPS.findIndex(s=>s.id===id)].setIcon(mkStopSvg(stop,true));

  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  const pill=document.getElementById('pill-'+id);
  if(pill)pill.classList.add('active');

  map.panTo({lat:stop.lat,lng:stop.lng});
  setTimeout(()=>map.setZoom(stop.zoom),300);

  showAttrMarkers(stop);
  renderSide(stop);

  clearDirections();
  if(dirOn && stop.walkPath) showWalkingDirections(stop);
}

function goOverview(){
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  if(currentStop){
    stopMarkers[STOPS.findIndex(s=>s.id===currentStop.id)].setIcon(mkStopSvg(currentStop,false));
    currentStop=null;
  }
  clearAttrMarkers(); clearDirections();
  infoWindow.close();
  map.panTo(OV); setTimeout(()=>map.setZoom(5),300);
  document.getElementById('sph').style.display='flex';
  document.getElementById('sideMain').style.display='none';
}

function toggleSat(){
  isSat=!isSat;
  map.setMapTypeId(isSat?'hybrid':'roadmap');
  document.getElementById('btnSat').classList.toggle('on',isSat);
}

function toggleDirections(){
  dirOn=!dirOn;
  document.getElementById('btnWalk').classList.toggle('on',dirOn);
  if(dirOn&&currentStop&&currentStop.walkPath) showWalkingDirections(currentStop);
  else clearDirections();
}

function selectAttr(i){
  if(!currentStop)return;
  const a=currentStop.attrs[i];
  document.querySelectorAll('.acard').forEach(c=>c.classList.remove('active'));
  const card=document.getElementById('ac'+i);
  if(card){card.classList.add('active');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
  map.panTo({lat:a.lat,lng:a.lng});
  if(attrMarkers[i])openIW(attrMarkers[i],a,currentStop);
}

// ═══════════════════════════════════════
// SIDE PANEL
// ═══════════════════════════════════════
function renderSide(stop){
  document.getElementById('sph').style.display='none';
  const sm=document.getElementById('sideMain');
  sm.style.display='flex'; sm.style.flexDirection='column'; sm.style.flex='1'; sm.style.overflow='hidden';

  const tags=stop.tags.map(([l,tc,bg])=>`<span class="stag" style="background:${bg};color:${tc}">${l}</span>`).join('');
  const walkNote = stop.walkPath ? `<div style="font-size:9px;color:${stop.color};margin-top:6px;margin-left:35px;font-weight:600;letter-spacing:0.03em">🚶 ${stop.walkLabel} — toggle "Directions" above</div>` : '';

  sm.innerHTML=`
    <div class="side-hdr">
      <div class="sh-row">
        <div class="sh-badge" style="background:${stop.color}">${stop.num}</div>
        <span class="sh-city" style="color:${stop.color}">${stop.name}</span>
        <span class="sh-country">${stop.country}</span>
      </div>
      <div class="sh-meta">${stop.dates} · ${stop.nights} · <a href="${stop.mapsUrl}" target="_blank">Google Maps ↗</a></div>
      <div class="sh-tags">${tags}</div>
      ${walkNote}
    </div>
    <div class="side-transport"><b>Transport:</b> ${stop.transport}</div>
    <div class="attr-scroll">
      <div class="sec-title">${stop.attrs.length} attractions · tap to open on map</div>
      ${stop.attrs.map((a,i)=>`
        <div class="acard" id="ac${i}" onclick="selectAttr(${i})">
          <div class="ac-num" style="background:${stop.color}">${i+1}</div>
          <div class="ac-thumb-wrap"><img class="ac-thumb" id="th${i}" alt="${a.name}"></div>
          <div class="ac-info">
            <div class="ac-name">${a.name}</div>
            <div class="ac-type">${a.type}</div>
            <div class="ac-day" style="color:${stop.color}">${a.day}</div>
            <div class="ac-stars">${a.rating}</div>
            <div class="ac-links">
              <a href="${a.mapsUrl}" target="_blank" class="acl acl-g" onclick="event.stopPropagation()">📍 Maps</a>
              ${a.bookUrl?`<a href="${a.bookUrl}" target="_blank" class="acl acl-b" onclick="event.stopPropagation()">🎟 Book</a>`:''}
            </div>
          </div>
        </div>`).join('')}
    </div>`;

  stop.attrs.forEach((a,i)=>{
    const img=document.getElementById('th'+i);
    if(img)fetchThumb(a.placeId,img);
  });
}

// ═══════════════════════════════════════
// BUILD TOP BAR UI
// ═══════════════════════════════════════
function buildUI(){
  const pc=document.getElementById('pills');
  const rb=document.getElementById('routeBar');
  const segs=['🚂','🚐','✈','🚐','✈'];
  STOPS.forEach((s,i)=>{
    const p=document.createElement('div');
    p.className='pill'; p.id='pill-'+s.id;
    p.style.cssText=`background:${s.bg};color:${s.tc};border-color:${s.color};--c:${s.color}`;
    p.textContent=`${s.num} ${s.name}`; p.onclick=()=>selectStop(s.id);
    pc.appendChild(p);

    const rs=document.createElement('div'); rs.className='rb-stop';
    const dot=document.createElement('div'); dot.className='rb-dot';
    dot.style.background=s.color; dot.textContent=s.num; dot.onclick=()=>selectStop(s.id);
    const nm=document.createElement('div'); nm.className='rb-name';
    nm.style.color=s.tc; nm.textContent=s.name; nm.onclick=()=>selectStop(s.id);
    rs.appendChild(dot); rs.appendChild(nm); rb.appendChild(rs);

    if(i<STOPS.length-1){
      const ar=document.createElement('div'); ar.className='rb-seg';
      ar.textContent=` ${segs[i]} `; rb.appendChild(ar);
    }
  });
}
</script>
