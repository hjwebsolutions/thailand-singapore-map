<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thailand + Singapore 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@600&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',-apple-system,sans-serif;overflow:hidden;background:#0f0e0b}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;padding:0 16px;height:56px;
  background:rgba(15,14,11,0.97);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.08);z-index:300;
  position:relative;gap:10px;flex-shrink:0;
}
.trip-brand{flex-shrink:0}
.trip-title{font-family:'Playfair Display',serif;font-size:15px;color:#f0ede6;letter-spacing:0.01em}
.trip-sub{font-size:10px;color:#6b6860;margin-top:1px;letter-spacing:0.04em}
.pills{display:flex;gap:4px;overflow-x:auto;flex:1;padding:0 4px}
.pills::-webkit-scrollbar{display:none}
.pill{
  padding:5px 12px;border-radius:99px;font-size:11px;font-weight:500;
  cursor:pointer;border:1.5px solid transparent;white-space:nowrap;
  transition:all 0.2s;flex-shrink:0;letter-spacing:0.02em;
}
.pill.active{box-shadow:0 0 0 2px rgba(255,255,255,0.15),0 0 0 4px var(--c)}
.topbtn{
  padding:6px 13px;border-radius:8px;font-size:11px;font-weight:500;
  cursor:pointer;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);color:#b0ada6;
  white-space:nowrap;flex-shrink:0;transition:all 0.15s;font-family:'DM Sans',sans-serif;
  letter-spacing:0.03em;
}
.topbtn:hover{background:rgba(255,255,255,0.1);color:#f0ede6}
.topbtn.on{background:#7B68C8;color:#fff;border-color:#7B68C8}

/* ── ROUTE BAR ── */
.route-bar{
  display:flex;align-items:center;height:34px;padding:0 16px;
  background:rgba(10,9,7,0.95);border-bottom:1px solid rgba(255,255,255,0.06);
  overflow-x:auto;gap:0;flex-shrink:0;-webkit-overflow-scrolling:touch;
}
.route-bar::-webkit-scrollbar{display:none}
.rb-stop{display:flex;align-items:center;gap:4px;cursor:pointer;padding:0 2px}
.rb-dot{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0;transition:transform 0.15s}
.rb-dot:hover{transform:scale(1.2)}
.rb-name{font-size:10px;font-weight:500;white-space:nowrap;padding:0 4px;letter-spacing:0.02em;transition:color 0.15s}
.rb-seg{font-size:13px;color:rgba(255,255,255,0.2);padding:0 4px;flex-shrink:0}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100vh - 90px)}
#map{flex:1}

/* ── SIDE PANEL ── */
.side{
  width:350px;flex-shrink:0;
  background:rgba(12,11,9,0.98);
  border-left:1px solid rgba(255,255,255,0.07);
  display:flex;flex-direction:column;overflow:hidden;
}
.side-placeholder{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;padding:28px;text-align:center;
}
.sp-icon{font-size:40px;opacity:0.6}
.sp-title{font-family:'Playfair Display',serif;font-size:18px;color:#f0ede6}
.sp-text{font-size:12px;line-height:1.65;color:#6b6860}

.side-hdr{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.sh-row{display:flex;align-items:center;gap:9px}
.sh-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sh-city{font-family:'Playfair Display',serif;font-size:18px;color:#f0ede6}
.sh-country{font-size:11px;color:rgba(255,255,255,0.3);margin-left:2px;font-weight:300}
.sh-meta{font-size:10px;color:#6b6860;margin-top:3px;margin-left:35px;letter-spacing:0.03em}
.sh-meta a{color:#7B9CD4;text-decoration:none}
.sh-meta a:hover{text-decoration:underline}
.sh-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px;margin-left:35px}
.stag{font-size:9px;font-weight:600;padding:2px 8px;border-radius:99px;letter-spacing:0.04em}

.side-transport{
  padding:10px 16px;background:rgba(255,255,255,0.03);
  border-bottom:1px solid rgba(255,255,255,0.06);
  font-size:10.5px;color:#8a8780;line-height:1.6;flex-shrink:0;
}
.side-transport b{color:#c0bdb6}
.side-transport a{color:#7B9CD4;text-decoration:none}
.side-transport a:hover{text-decoration:underline}

.attr-scroll{flex:1;overflow-y:auto}
.attr-scroll::-webkit-scrollbar{width:3px}
.attr-scroll::-webkit-scrollbar-track{background:transparent}
.attr-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.sec-title{
  padding:8px 16px 4px;font-size:9px;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;color:rgba(255,255,255,0.25);
  position:sticky;top:0;background:rgba(12,11,9,0.98);z-index:2;
}

.acard{
  display:flex;gap:10px;padding:10px 14px 10px 12px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;transition:background 0.1s;
  border-left:3px solid transparent;align-items:flex-start;
  min-height:48px;
}
.acard:hover{background:rgba(255,255,255,0.03)}
.acard.active{background:rgba(123,104,200,0.12);border-left-color:#7B68C8}
.ac-num{
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;color:#fff;flex-shrink:0;margin-top:2px;
}
.ac-thumb-wrap{width:64px;height:52px;border-radius:7px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,0.05);position:relative}
.ac-thumb{width:100%;height:100%;object-fit:cover;display:block}
.ac-fb{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:3px}
.ac-fb-emoji{font-size:18px;line-height:1}
.ac-fb-name{font-size:6.5px;color:rgba(255,255,255,0.55);text-align:center;line-height:1.3;word-break:break-word}
.ac-info{flex:1;min-width:0}
.ac-name{font-size:11.5px;font-weight:600;color:#e8e5de;line-height:1.25;letter-spacing:0.01em}
.ac-type{font-size:9.5px;color:#5a5855;margin-top:1px}
.ac-day{font-size:9.5px;font-weight:700;margin-top:2px;letter-spacing:0.02em}
.ac-stars{font-size:9.5px;color:#BA7517;margin-top:1px}
.ac-links{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.acl{font-size:9.5px;padding:2px 8px;border-radius:5px;text-decoration:none;font-weight:600;transition:opacity 0.15s}
.acl:hover{opacity:0.8}
.acl-g{background:rgba(24,95,165,0.25);color:#7B9CD4}
.acl-b{background:rgba(15,110,86,0.25);color:#4DB896}

/* ── INFO WINDOW ── */
.iw{font-family:'DM Sans',sans-serif;width:280px;border-radius:12px;overflow:hidden;background:#1a1916}
.iw-carousel{position:relative;width:280px;height:165px;overflow:hidden;background:#111;touch-action:pan-y}
.iw-track{display:flex;height:165px;transition:transform 0.35s cubic-bezier(.4,0,.2,1)}
.iw-slide{width:280px;height:165px;flex-shrink:0;position:relative}
.iw-img{width:100%;height:165px;object-fit:cover;display:block}
.iw-img-placeholder{width:280px;height:165px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.iw-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:300;line-height:1;
  transition:background 0.15s;z-index:10;user-select:none;
}
.iw-arrow:hover{background:rgba(0,0,0,0.85)}
.iw-prev{left:8px}
.iw-next{right:8px}
.iw-close{
  position:absolute;top:8px;right:8px;
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,0.2);
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;line-height:1;z-index:20;user-select:none;
}
/* expanded tap target without growing the visual button */
.iw-close::before{content:'';position:absolute;inset:-10px}
.iw-close:hover{background:rgba(0,0,0,0.9)}
.iw-counter{
  position:absolute;bottom:8px;right:10px;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);
  color:rgba(255,255,255,0.85);font-size:10px;font-weight:600;
  padding:2px 7px;border-radius:99px;z-index:5;font-family:'DM Sans',sans-serif;
}
.iw-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:5}
.iw-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.35);cursor:pointer;transition:background 0.15s}
.iw-dot.on{background:#fff}
.iw-body{padding:11px 13px 13px}
.iw-name{font-size:13.5px;font-weight:700;color:#f0ede6;margin-bottom:2px;line-height:1.25;font-family:'DM Sans',sans-serif}
.iw-meta{font-size:10px;color:#5a5855;margin-bottom:2px}
.iw-day{font-size:10px;font-weight:700;color:#9B8CD8;margin-bottom:3px}
.iw-stars{font-size:10.5px;color:#BA7517;margin-bottom:6px}
.iw-desc{font-size:10.5px;color:#8a8780;line-height:1.55;margin-bottom:9px}
.iw-btns{display:flex;gap:6px}
.iw-btn{
  flex:1;text-align:center;font-size:11px;font-weight:700;
  padding:7px 8px;border-radius:8px;text-decoration:none;
  letter-spacing:0.02em;transition:opacity 0.15s;font-family:'DM Sans',sans-serif;
}
.iw-btn:hover{opacity:0.85}
.iw-gm{background:#185FA5;color:#fff}
.iw-bk{background:#0F6E56;color:#fff}
/* override Google Maps info window chrome */
.gm-style .gm-style-iw-c{padding:0!important;border-radius:12px!important;background:#1a1916!important;box-shadow:0 8px 40px rgba(0,0,0,0.6)!important}
.gm-style .gm-style-iw-d{overflow:hidden!important;padding:0!important}
.gm-style .gm-style-iw-chr{display:none!important}
.gm-style .gm-style-iw-t::after{background:#1a1916!important}

/* ── MOBILE (≤768px) ── */
@media (max-width:768px){
  /* Body is a flex column so .layout fills remaining height */
  html,body{height:100%;overflow:hidden}
  body{display:flex;flex-direction:column}

  /* Topbar stays sticky at top */
  .topbar{
    height:auto;min-height:48px;flex-wrap:wrap;
    padding:8px 12px;gap:6px;
    position:sticky;top:0;z-index:300;flex-shrink:0;
  }
  .trip-brand{order:0;flex:1 1 auto}
  .pills{order:2;flex:0 0 100%;width:100%;padding:0;margin-top:2px;-webkit-overflow-scrolling:touch}
  .pill{padding:4px 10px;font-size:10px}
  .topbtn{font-size:10px;padding:5px 9px;order:1}
  .route-bar{touch-action:pan-x;height:36px;flex-shrink:0}

  /* Layout: positioning context for map + side panel */
  .layout{flex:1;min-height:0;position:relative;overflow:hidden}

  /* Map pinned to top of layout */
  #map{
    position:absolute;top:0;left:0;right:0;
    height:45vh;min-height:240px;
    box-shadow:0 4px 20px rgba(0,0,0,0.55);
  }

  /* Side panel: absolutely positioned below map with hard bottom bound — iOS-safe scroll container */
  .side{
    position:absolute;top:45vh;left:0;right:0;bottom:0;
    width:100%;
    border-left:none;border-top:none;
    overflow-y:scroll;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
  }

  /* sideMain must not clip its content (overrides inline style) */
  #sideMain{overflow:visible!important;flex:none!important;height:auto!important}

  /* Attraction list flows naturally so .side does the scrolling */
  .attr-scroll{overflow:visible;max-height:none;flex:none}
  /* Bottom breathing room so last card isn't clipped */
  .attr-scroll::after{content:'';display:block;height:56px}
  .sec-title{position:static}

  /* Tap targets & typography */
  .acard{min-height:56px;padding:12px 14px 12px 12px}
  .ac-name{font-size:12.5px}
  .ac-type,.ac-day,.ac-stars{font-size:10px}
  .acl{font-size:10px;padding:3px 10px}
  .trip-title{font-size:14px}
  .trip-sub{font-size:9px}
  .sh-city{font-size:16px}
  .side-transport{font-size:11px}
  .sp-text{font-size:13px}

  /* Info window scaled for narrower screens */
  .iw{width:240px}
  .iw-carousel{width:240px;height:145px}
  .iw-track{height:145px}
  .iw-slide{width:240px;height:145px}
  .iw-img{height:145px}
  .iw-img-placeholder{width:240px;height:145px}
  .iw-arrow{width:26px;height:26px;font-size:13px}
}
</style>
</head>

      {name:'Wat Arun Ratchawararam',placeId:'ChIJaSv_6gaZ4jARnbiUVn6Z_YY',type:'Buddhist Temple',day:'Dec 14 — 14:00',rating:'4.7★ (44,239)',lat:13.7439,lng:100.4884,mapsUrl:'https://maps.google.com/?cid=13729523753940879764',bookUrl:null,desc:'Temple of Dawn — porcelain-encrusted riverside prang. Cross the Chao Phraya by ferry from Tha Tien pier (4 THB, 3 min). Best in late afternoon golden light. 100 THB.'},
      {name:'The Deck by Arun Residence',placeId:'ChIJXW-7kH462jARZ0ObpXBi1Jg',type:'Restaurant — Riverside Terrace',day:'Dec 14 — 12:30 (lunch)',rating:'4.4★ (3,535)',lat:13.7446,lng:100.4890,mapsUrl:'https://maps.google.com/?q=The+Deck+by+Arun+Residence+Bangkok',bookUrl:null,desc:'Rooftop terrace with direct Grand Palace view across the Chao Phraya. $$$. Fusion menu. Reserve ahead — the view is unbeatable for lunch between Wat Pho and Wat Arun.'},
      {name:'Chinatown — Yaowarat Road',placeId:'ChIJD-NLSWyZ4jARCQ3OoWjiHYs',type:'Street Food & Night Market',day:'Dec 13 evening + Dec 16',rating:'4.5★ (3,671)',lat:13.7373,lng:100.5129,mapsUrl:'https://maps.google.com/?q=Yaowarat+Road+Bangkok',bookUrl:null,desc:'Bangkok\'s most electric street food strip. Start at Odean Circle, walk west. Neon-lit woks, oyster omelette, roasted duck, dim sum, mango sticky rice. Best atmosphere 7–10pm. Take Chao Phraya express boat south to ICONSIAM after.'},
      {name:'ICONSIAM',placeId:'ChIJpVOBwLCf4jARNPzQU1E2Tig',type:'Shopping & SookSiam Indoor Floating Market',day:'Dec 13 evening / any evening',rating:'4.7★ (57,438)',lat:13.7262,lng:100.5096,mapsUrl:'https://maps.google.com/?q=ICONSIAM+Bangkok',bookUrl:null,desc:'Riverside mega-mall with SookSiam — an indoor floating market with 100+ street food vendors from all Thai regions. Best food hall in Bangkok. Free shuttle boat from Sathorn pier and many riverside hotels. Open until midnight.'},
      {name:'Chatuchak Weekend Market',placeId:'ChIJ3fiD6BSc4jARS324hNeR8ZE',type:'Market (Sat–Sun only)',day:'Dec 14 — 15:00',rating:'4.4★ (55,419)',lat:13.7998,lng:100.5504,mapsUrl:'https://maps.google.com/?cid=8440027765490052243',bookUrl:null,desc:'World\'s largest weekend market — 35 acres, 15,000 stalls. Open Sat–Sun 9am–6pm. Clothes, antiques, street food, plants, art. Best visited 15:00–18:00 when cooler. Take MRT to Chatuchak Park.'},
      {name:'Octave Rooftop Lounge & Bar',placeId:'ChIJhxshNqWf4jARgYxEW8hBGcE',type:'Rooftop Bar',day:'Dec 14 evening',rating:'4.4★ (6,051)',lat:13.7235,lng:100.5805,mapsUrl:'https://maps.google.com/?cid=10437060213803200004',bookUrl:'https://www.marriott.com/en-us/hotels/bkkmc-bangkok-marriott-hotel-sukhumvit/',desc:'360° Bangkok panorama from Marriott Sukhumvit. Opens 17:00. Min spend ~1,800 THB/person. Book a table — sunset slot fills fast. DJ from 8pm.'},
      {name:'Sky Bar — Lebua at State Tower',placeId:'ChIJm1a-ib2Y4jARtPi3eTwFXME',type:'Rooftop Bar (The Hangover)',day:'Dec 14–16 evenings',rating:'4.3★ (7,218)',lat:13.7234,lng:100.5143,mapsUrl:'https://maps.google.com/?q=Sky+Bar+Lebua+Bangkok',bookUrl:'https://www.lebua.com/sky-bar/',desc:'The famous "Hangover" bar — 63 floors, open to the sky. Circular bar atop State Tower on the Chao Phraya bend. Smart casual dress code (no shorts/flip-flops). $$$$. Book a table online for the best panorama of the river.'},
      {name:'Vertigo & Moon Bar — Banyan Tree',placeId:'ChIJUVRdQr2Y4jARVPrBuSmMjXc',type:'Rooftop Bar',day:'Dec 14–16 evenings',rating:'4.2★ (4,834)',lat:13.7246,lng:100.5309,mapsUrl:'https://maps.google.com/?q=Vertigo+Moon+Bar+Banyan+Tree+Bangkok',bookUrl:'https://www.banyantree.com/thailand/bangkok/dining/vertigo-and-moon-bar',desc:'Finest panorama in Bangkok — 61st floor outdoor rooftop with unobstructed 360° views. Dress code (no shorts/sandals). Arrive at opening (17:00) for golden hour. Open-air jazz nightly. $$$$. Book ahead.'},
      {name:'Khlong Lad Mayom Floating Market',placeId:'ChIJEe2E-PYxUDARcfOQB3Woa9w',type:'Floating Market (Sat–Sun)',day:'Dec 15 — 07:00',rating:'4.3★ (11,528)',lat:13.7535,lng:100.4186,mapsUrl:'https://maps.google.com/?q=Khlong+Lat+Mayom+Floating+Market',bookUrl:null,desc:'RECOMMENDED floating market — 45 min from city center. Authentic, mostly locals. Canals with paddleboat vendors, fresh food stalls, craft beer. Sat–Sun only. Far more genuine than Damnoen Saduak. Go early (7–9am) then head to Ayutthaya.'},
      {name:'Damnoen Saduak Floating Market',placeId:'ChIJ-3DpLukmUTARXxJDT5YJPWU',type:'Floating Market (Tourist Classic)',day:'Dec 15 (day trip option)',rating:'4.1★ (21,463)',lat:13.5182,lng:99.9577,mapsUrl:'https://maps.google.com/?q=Damnoen+Saduak+Floating+Market',bookUrl:'https://www.viator.com/en-US/tours/Bangkok/Damnoen-Saduak-Floating-Market/d343-4285DAMLOEI',desc:'~90 min from Bangkok. Classic canal market — wooden boats with fruit, pad thai, souvenirs. Very touristy but iconic. Most photogenic 8–9am before crowds peak. Combine with Maeklong Railway Market on same day.'},
      {name:'Rajadamnern Muay Thai Stadium',placeId:'ChIJEyraT0CZ4jAREz5xKJKTLDM',type:'Muay Thai Stadium',day:'Dec 15 — 19:00',rating:'4.8★ (8,318)',lat:13.7611,lng:100.5085,mapsUrl:'https://maps.google.com/?cid=4840895898665467700',bookUrl:'https://www.rajadamnern.com',desc:'Bangkok\'s legendary 1945 Muay Thai stadium. Bouts run 18:30–22:00 on Mon/Wed/Thu/Sun. Tickets 800–2,000 THB. Book online. Immersive Thai cultural experience — ringside seats are worth the premium.'},
      {name:'Train Night Market Ratchada',placeId:'ChIJlYvmF4ec4jARzaS9zHT9Eag',type:'Night Market',day:'Dec 13–16 evenings (Wed–Sun)',rating:'4.3★ (25,471)',lat:13.7758,lng:100.5636,mapsUrl:'https://maps.google.com/?q=Talad+Rod+Fai+Ratchada+Bangkok',bookUrl:null,desc:'Talad Rod Fai 2 — Instagram-famous market under a sea of colorful umbrellas. Vintage goods, street food, live music. Open Wed–Sun from 17:00. MRT Thailand Cultural Centre (exit 3). More energetic crowd than Chatuchak.'},
      {name:'Lumphini Park',placeId:'ChIJk0RBqLiZ4jARJ7hYgf-E_m0',type:'Urban Park',day:'Dec 13–16 mornings',rating:'4.5★ (42,382)',lat:13.7308,lng:100.5418,mapsUrl:'https://maps.google.com/?q=Lumphini+Park+Bangkok',bookUrl:null,desc:'Bangkok\'s lungs — 142 acres of lake and greenery in the heart of the city. Morning tai chi, monitor lizards in the lake. Great for a 06:00–07:30 run or stroll before the heat. MRT Lumphini or Silom.'},
      {name:'Khao San Road',placeId:'ChIJdwWChvWZ4jARZ6jAnOdcREU',type:'Backpacker Strip & Nightlife',day:'Dec 13–16 evenings',rating:'4.1★ (18,745)',lat:13.7589,lng:100.4972,mapsUrl:'https://maps.google.com/?q=Khao+San+Road+Bangkok',bookUrl:null,desc:'Bangkok\'s iconic backpacker strip near the Grand Palace. Neon-lit bars, cheap buckets, live music, street food, pad thai carts. Chaotic and fun for at least one night. ~10 min tuk-tuk from Tha Tien pier after visiting the temples.'},
      {name:'Ayutthaya Historical Park',placeId:'ChIJ-UkaTEl04jAR2QgEGFAM1dU',type:'UNESCO Day Trip (~1.5 hrs north)',day:'Dec 15 — 10:30',rating:'4.7★ (25,240)',lat:14.3569,lng:100.5675,mapsUrl:'https://maps.google.com/?q=Ayutthaya+Historical+Park',bookUrl:'https://www.viator.com/en-US/tours/Bangkok/Ayutthaya-Day-Trip-from-Bangkok/d343-73830P1',desc:'Ancient Siamese capital — UNESCO World Heritage Site. Famous Buddha head in tree roots at Wat Mahathat. Three-prang royal temple at Wat Phra Si Sanphet. Rent bicycles on site ~50 THB/hr. Guided tour ~$40/person includes transport.'},
      {name:'King Power Mahanakhon',placeId:'ChIJGzV2mdKY4jARdIb62T7BoE4',type:'Observation Deck',day:'Dec 16 — 09:00',rating:'4.7★ (28,823)',lat:13.7240,lng:100.5285,mapsUrl:'https://maps.google.com/?q=King+Power+Mahanakhon+Bangkok',bookUrl:'https://kingpowermahanakhon.co.th/en/',desc:'78th-floor glass skywalk — 314m above Bangkok. 880 THB. Book online to skip lines. Stand on the glass floor panels for an unforgettable perspective. Indoor + outdoor decks.'},
      {name:'Thao Maha Brahma (Erawan Shrine)',placeId:'ChIJi12j3ame4jARHAq5pOHm_Qc',type:'Sacred Shrine',day:'Dec 16 — 09:00',rating:'4.7★ (6,752)',lat:13.7444,lng:100.5393,mapsUrl:'https://maps.google.com/?q=Erawan+Shrine+Bangkok',bookUrl:null,desc:'Bangkok\'s most famous Hindu shrine at the Ploenchit/Ratchadamri intersection. Thai classical dancers perform offerings throughout the day. Free entry. Takes 15 min — stop here before or after King Power Mahanakhon.'},
      {name:'Asiatique The Riverfront',placeId:'ChIJtepc75aY4jARVvgRfYrM38s',type:'Night Market',day:'Dec 16 evening',rating:'4.4★ (73,222)',lat:13.7044,lng:100.5033,mapsUrl:'https://maps.google.com/?cid=11693148413978992086',bookUrl:null,desc:'Vintage trading port riverside market. Open-air warehouses with 1,500+ shops and restaurants. Ferris wheel, live shows. Free shuttle boat from Sathorn pier (runs 4pm–11:30pm). Perfect final Bangkok evening.'},
      {name:'Soi Sukhumvit 11',placeId:'NOID_soisukhumvit11',type:'Bar Street',day:'Dec 14–16 evenings',rating:'4.4★',lat:13.7448,lng:100.5573,mapsUrl:'https://maps.google.com/?q=Soi+11+Sukhumvit+Bangkok',bookUrl:null,desc:'Best bar street in Bangkok. Mix of upscale Thai bars, international restaurants, and clubs. Walking distance from Nana BTS station. After rooftop drinks, head here for a nightcap or late dinner.'},

      {name:'Khao Sok National Park',placeId:'ChIJX5d1Mn4oUTARMK0fzC4Xf44',type:'Rainforest & Jungle',day:'Dec 17–19',rating:'4.7★ (8,656)',lat:8.9020,lng:98.5310,mapsUrl:'https://maps.google.com/?cid=10267951165188582704',bookUrl:null,desc:'160-million-year-old rainforest — older than the Amazon. Guided jungle hike (half-day, arrange through bungalow), wildlife spotting (gibbons, hornbills, monitor lizards), cave exploration, night safari with ranger. 300 THB park entry.'},
      {name:'Coral Cave Exploration',placeId:'ChIJJ970f4FIUTARF0JM-oWEq7U',type:'Cave Tour',day:'Dec 17 afternoon',rating:'4.3★',lat:8.9158,lng:98.8864,mapsUrl:'https://maps.google.com/?q=Coral+Cave+Khao+Sok',bookUrl:null,desc:'Accessible by short boat + 20-min jungle walk from bungalows. Stalactites and stalagmites deep in the karst. Best done Day 1 afternoon after check-in. Arrange through bungalow operator. Bring headlamp.'},
      {name:'Night Safari — Khao Sok',placeId:'ChIJX5d1Mn4oUTARMK0fzC4Xf44',type:'Wildlife Night Walk',day:'Dec 17 evening (~20:00)',rating:'4.7★',lat:8.9100,lng:98.5350,mapsUrl:'https://maps.google.com/?q=Khao+Sok+National+Park',bookUrl:null,desc:'Spotlighting for nocturnal wildlife with a ranger along jungle trails. Gibbons, flying squirrels, snakes, insects. Book through national park or bungalow. ~2 hrs. Best experience of the Khao Sok stay.'},
      {name:'Dawn on Cheow Lan Lake',placeId:'ChIJ99wwYGg2UTAR9cI8eds2OhQ',type:'Photography + Kayaking',day:'Dec 18 — 05:30',rating:'4.9★',lat:8.9800,lng:98.8100,mapsUrl:'https://maps.google.com/?q=Cheow+Lan+Lake',bookUrl:null,desc:'Set alarm for 05:30. Mist rising off the emerald lake against limestone karst cliffs at dawn — the best photograph of the entire trip. Rent a kayak from the bungalow and paddle out in complete silence.'},

    transport:'🚐 Van from Khao Sok (~3 hrs). Arrive evening Dec 19. Stay Laguna/Bang Tao — 1km from EDC Rhythm Park. ✈ Depart Dec 24: <a href="https://www.bangkokair.com" target="_blank">Bangkok Airways</a> HKT → CNX via BKK.',

    attrs:[
      {name:'EDC Thailand — Rhythm Park',placeId:'ChIJ8Tyhv283UDAR8c0BlLHC9EY',type:'Music Festival (Dec 20)',day:'Dec 20 — gates 15:00',rating:'4.6★',lat:8.0052,lng:98.3130,mapsUrl:'https://maps.google.com/?q=Rhythm+Park+Laguna+Phuket',bookUrl:'https://thailand.electricdaisycarnival.com/en/',desc:'Electric Daisy Carnival 2026 — 3rd edition at Rhythm Park, Laguna Phuket. Dec 18–20 — pick Dec 20 (Saturday) for peak energy. GA 1-day pass ~$249 USD. Age 20+, physical passport required. Walk or short shuttle from Laguna Airbnb.'},
      {name:'Rassada Pier',placeId:'ChIJeXfKCf0yUDARkGJxHVl5v4o',type:'Ferry Departure Point',day:'Dec 22 — 07:00 departure',rating:'4.2★',lat:7.8748,lng:98.4032,mapsUrl:'https://maps.google.com/?q=Rassada+Pier+Phuket',bookUrl:null,desc:'Main pier for speedboat day trips to Phi Phi Islands and Phang Nga Bay. Depart 07:00 to beat crowds. Grab to pier from most hotels ~150–200 THB. Old Phuket Town walking route starts just west of here.'},
      {name:'Old Phuket Town + Thanon Talang',placeId:'ChIJyXu3hvoxUDAR86GPJxPu9G8',type:'Historic District',day:'Dec 19 afternoon + Dec 21',rating:'4.5★',lat:7.8849,lng:98.3876,mapsUrl:'https://maps.google.com/?q=Old+Phuket+Town',bookUrl:null,desc:'Sino-Portuguese pastel shophouses, street murals, boutique cafés. Walk from Rassada Pier area to Thalang Road south to Dibuk Road. Thanon Talang is the most photogenic street. Toggle "Directions" above for the full walking route.'},
      {name:'Raya Restaurant',placeId:'ChIJhq1m6UYxUDAR-v3ViIAHtBA',type:'Restaurant — Heritage Shophouse',day:'Dec 19 or 21 dinner',rating:'4.4★ (3,328)',lat:7.8859,lng:98.3909,mapsUrl:'https://maps.google.com/?q=Raya+Restaurant+Phuket',bookUrl:null,desc:'Iconic Old Phuket Town restaurant in a restored Sino-Portuguese shophouse. Famous for crab omelette and Southern Thai crab curry. Book ahead — fills fast. $$-$$$.'},
      {name:'One Chun Cafe & Restaurant',placeId:'ChIJlYfBt0YxUDAR1D6RNBaOHhA',type:'Restaurant — Thai-Chinese Heritage',day:'Dec 19 or 21 lunch',rating:'4.4★ (5,941)',lat:7.8856,lng:98.3904,mapsUrl:'https://maps.google.com/?q=One+Chun+Restaurant+Phuket',bookUrl:null,desc:'Beloved Old Town institution — Thai-Chinese home cooking in a charming shophouse. Cheaper than Raya but equally authentic. Famous for mee hokkien and braised pork. Go for lunch. Order the Phuket lobster when available.'},
      {name:'Nai Yang Beach',placeId:'ChIJX2uf05s1UDAROIBBsTjQq1o',type:'Beach',day:'Dec 20 morning (pre-EDC)',rating:'4.4★ (1,230)',lat:8.1644,lng:98.2989,mapsUrl:'https://maps.google.com/?q=Nai+Yang+Beach+Phuket',bookUrl:null,desc:'Closest beach to Laguna/EDC area — just 10 min drive. Quiet, long, local vibe, protected by national park. Great for resting the morning before EDC. Almost no tourists. Beautiful sunsets.'},
      {name:'Freedom Beach',placeId:'ChIJ4S3VTuIkUDAR3mKUwV8K1Ks',type:'Secluded Beach',day:'Dec 21 morning',rating:'4.4★ (10,673)',lat:7.8938,lng:98.2792,mapsUrl:'https://maps.google.com/?q=Freedom+Beach+Phuket',bookUrl:null,desc:'Phuket\'s most beautiful hidden beach. Accessible by longtail boat from Patong (~100 THB, 15 min) or 20-min hike. Crystal clear water, soft sand, no jet skis. Go in the morning for calm water and fewer people.'},
      {name:'Kamala Beach',placeId:'ChIJU6_SgWcwUDAR6BXy4ZRZXQQ',type:'Beach',day:'Dec 19 evening / Dec 21',rating:'4.4★ (3,796)',lat:7.9440,lng:98.2816,mapsUrl:'https://maps.google.com/?q=Kamala+Beach+Phuket',bookUrl:null,desc:'Relaxed, beautiful crescent beach 20 min from Laguna. Good base beach. Less crowded than Patong. Good sunset drinks restaurants along the strip.'},
      {name:'Karon Beach',placeId:'ChIJ1SemHHIlUDARH2WofLMBaOQ',type:'Beach',day:'Dec 21 afternoon',rating:'4.6★ (9,136)',lat:7.8439,lng:98.2936,mapsUrl:'https://maps.google.com/?q=Karon+Beach+Phuket',bookUrl:null,desc:'Wide, clean, less crowded than Patong. Great swimming, beautiful long stretch. Kata Beach is just south for surf. Lunch restaurants along Karon strip are excellent value.'},
      {name:'Kata Beach',placeId:'ChIJpfvyFxQkUDARXlpwq1gWzJE',type:'Beach + Surf',day:'Dec 21',rating:'4.5★ (13,492)',lat:7.8197,lng:98.2987,mapsUrl:'https://maps.google.com/?q=Kata+Beach+Phuket',bookUrl:null,desc:'Beautiful bay with good waves for surfing December–March. Cleaner and less crowded than Patong. Great restaurants and bars along the beach road. Kata Noi (tiny cove just south) is even more scenic.'},
      {name:'Nai Harn Beach',placeId:'ChIJY9PFUEQmUDARPeRjpz0UE-Y',type:'Beach',day:'Dec 21 late afternoon',rating:'4.6★ (7,285)',lat:7.7780,lng:98.3052,mapsUrl:'https://maps.google.com/?q=Nai+Harn+Beach+Phuket',bookUrl:null,desc:'Southern Phuket\'s most beautiful beach — wide bay with crystal clear water, ringed by hills. Less crowded than Kata/Karon. Combine with Promthep Cape for the best afternoon in Phuket. Excellent sunset dinner restaurants nearby.'},
      {name:'Promthep Cape + Windmill Viewpoint',placeId:'ChIJtZgCJiEmUDARG1q53LLQaAs',type:'Sunset Viewpoints',day:'Dec 21 — 17:00',rating:'4.7★ (18,216)',lat:7.7618,lng:98.3053,mapsUrl:'https://maps.google.com/?cid=9871866988162636315',bookUrl:null,desc:'Southern tip of Phuket — best sunset on the island. 270° panoramic Andaman Sea views. Arrive 30 min before sunset. Windmill Viewpoint is 2km north with similar views and fewer crowds. Both in one Grab trip.'},
      {name:'Big Buddha Phuket',placeId:'ChIJ0W1qdZsxUDARiL2pCKfqkXc',type:'Landmark',day:'Dec 21 — 15:00',rating:'4.6★ (38,269)',lat:7.8274,lng:98.3128,mapsUrl:'https://maps.google.com/?q=Big+Buddha+Phuket',bookUrl:null,desc:'45m white marble Buddha statue on Nakkerd Hill. Free entry. Panoramic views of both the Andaman Sea and Chalong Bay simultaneously. Take Grab (~150 THB). On the way to Promthep Cape — do both in the same afternoon.'},
      {name:'Phi Phi Islands + Maya Bay',placeId:'ChIJDT1Odr4gTjARcZ9UGni4nb8',type:'Speedboat Day Trip',day:'Dec 22 — depart 07:00',rating:'4.6★ (7,498)',lat:7.7407,lng:98.7784,mapsUrl:'https://maps.google.com/?cid=13807394858565148529',bookUrl:'https://www.viator.com/en-US/tours/Phuket/Phi-Phi-Islands-and-Maya-Bay-Speedboat-Day-Trip/d343-3428PHIPHI',desc:'Depart Rassada Pier 07:00. Phi Phi viewpoints hike (20 min, best photo of day), Maya Bay ("The Beach"), snorkeling at Pi Leh Bay + Ko Hong + Chicken Rock. Tour includes gear + guide. ~$70/person. Returns ~17:00.'},
      {name:'Phang Nga Bay — James Bond Island',placeId:'ChIJ8QtsYcOsUTARY16P2GPh_RM',type:'Full Day Boat Tour',day:'Dec 23 — depart 08:00',rating:'4.6★ (836)',lat:8.2745,lng:98.5012,mapsUrl:'https://maps.google.com/?q=James+Bond+Island+Phang+Nga',bookUrl:'https://www.viator.com/en-US/tours/Phuket/Phang-Nga-Bay-and-James-Bond-Island-Day-Trip/d343-5391P12',desc:'Khao Phing Kan ("The Man with the Golden Gun"). Sea cave kayaking through hidden hongs, Ko Hong Phang Nga, Ko Panyi floating village lunch, View Point Hong Island. ~$50/person via Viator. Returns ~17:00.'},
      {name:'Ko Panyi — Floating Village',placeId:'ChIJa_2mObirUTARdM2o7PvH_oo',type:'Floating Muslim Village',day:'Dec 23 (Phang Nga day trip)',rating:'4.4★ (5,218)',lat:8.2872,lng:98.5289,mapsUrl:'https://maps.google.com/?q=Ko+Panyi+Phang+Nga',bookUrl:null,desc:'Centuries-old fishing village built entirely on stilts above the Andaman Sea, sheltered by a limestone karst. Stop for seafood lunch on the tour. The football pitch — also on stilts — is legendary.'},
      {name:'Phuket Elephant Sanctuary',placeId:'ChIJ7TNuN8cyUDARWz3e3TFNJdo',type:'Ethical Elephant Sanctuary',day:'Dec 21 morning (optional)',rating:'4.7★ (2,847)',lat:8.0950,lng:98.3640,mapsUrl:'https://maps.google.com/?q=Phuket+Elephant+Sanctuary',bookUrl:'https://www.phuketelephant.com',desc:'Award-winning ethical sanctuary in the hills of Paklok. Feed, walk alongside, watch river bathing — no riding. ~$80/person. Half-day tour with pickup. Great backup if Khao Sok\'s schedule changes. Book direct.'},
      {name:'Patong Beach + Bangla Walking Street',placeId:'ChIJCwgz2sUkUDAR_6qZy8OVKEA',type:'Beach + Nightlife',day:'Dec 19 evening / optional',rating:'4.3★ (6,123)',lat:7.8990,lng:98.2963,mapsUrl:'https://maps.google.com/?q=Bangla+Walking+Street+Phuket',bookUrl:null,desc:'Phuket\'s main nightlife strip. Bangla Road is wall-to-wall bars and clubs from sundown. Go once for the experience — it\'s an institution. Good EDC warm-up energy.'},

  };
  google.maps.event.addListener(infoWindow, 'domready', () => {
    if (!pendingIWId) return;
    const id = pendingIWId;
    const trk = document.getElementById('trk_' + id);
    if (!trk || trk.children.length <= 1) return;
    const total = trk.children.length;
    let startX = 0, startY = 0;
    trk.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
    }, {passive:true});
    trk.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - startX;
      const dy = e.changedTouches[0].clientY - startY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        iwStep(id, dx < 0 ? 1 : -1, total);
      }
    }, {passive:true});
  });

  // Store pendingIWId before each setContent call via buildIWFull
  window._setPendingIWId = (id) => { pendingIWId = id; };

  // Close IW when clicking bare map
  google.maps.event.addListener(map, 'click', () => infoWindow.close());

  // Global close function for inline onclick in IW HTML
  window.closeIW = () => infoWindow.close();

  buildUI();
  drawRoutePaths();
  drawStops();
}

// ═══════════════════════════════════════
// ROUTE PATHS
// ═══════════════════════════════════════
function drawRoutePaths() {
  const segs = [
    {from:{lat:13.7563,lng:100.5018}, to:{lat:8.9177,lng:98.5278}, type:'train', color:'#E8A040'},
    {from:{lat:8.9177,lng:98.5278},  to:{lat:7.9519,lng:98.3381},  type:'van',   color:'#aaa'},
    {from:{lat:7.9519,lng:98.3381},  to:{lat:18.7883,lng:98.9853}, type:'flight', color:'#7B9CD4'},
    {from:{lat:18.7883,lng:98.9853}, to:{lat:19.1156,lng:98.7108}, type:'van',   color:'#aaa'},
    {from:{lat:19.1156,lng:98.7108}, to:{lat:1.3521,lng:103.8198}, type:'flight', color:'#7B9CD4'},
  ];
  segs.forEach(s => {
    const dashed = s.type !== 'van';
    new google.maps.Polyline({
      path:[s.from, s.to], map,
      strokeColor: s.color,
      strokeOpacity: dashed ? 0 : 0.5,
      strokeWeight: 2,
      icons: dashed ? [{
        icon:{path:'M 0,-1 0,1', strokeOpacity:0.65, scale: s.type==='flight'?3.5:2.5},
        offset:'0', repeat: s.type==='flight'?'22px':'12px'
      }] : []
    });
  });
  // Day trip lines
  [{from:{lat:7.9519,lng:98.3381},to:{lat:7.7407,lng:98.7784}},
   {from:{lat:18.7883,lng:98.9853},to:{lat:19.8233,lng:99.7627}}].forEach(d=>{
    new google.maps.Polyline({path:[d.from,d.to],map,strokeColor:'#BA7517',strokeOpacity:0,strokeWeight:1.5,
      icons:[{icon:{path:'M 0,-1 0,1',strokeOpacity:.55,scale:2},offset:'0',repeat:'9px'}]});
  });
}

// ═══════════════════════════════════════
// WALKING DIRECTIONS
// ═══════════════════════════════════════
let currentDirRoute = null;

function showWalkingDirections(stop) {
  clearDirections();
  if (!stop.walkPath || stop.walkPath.length < 2) return;
  const waypts = stop.walkPath.slice(1,-1).map(p=>({location:p, stopover:false}));
  directionsService.route({
    origin: stop.walkPath[0],
    destination: stop.walkPath[stop.walkPath.length-1],
    waypoints: waypts,
    travelMode: google.maps.TravelMode.WALKING,
  }, (result, status) => {
    if (status === google.maps.DirectionsStatus.OK) {
      directionsRenderer.setDirections(result);
      currentDirRoute = result;
    }
  });
}

function clearDirections() {
  directionsRenderer.setDirections({routes:[]});
  currentDirRoute = null;
}

// ═══════════════════════════════════════
// STOP MARKERS
// ═══════════════════════════════════════
function mkStopSvg(s, sel) {
  const r=sel?20:17, d=r*2+16;
  return {
    url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="${d}" height="${d+10}" viewBox="0 0 ${d} ${d+10}">
        <defs>
          <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
          <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="${s.color}" flood-opacity="0.5"/></filter>
        </defs>
        <circle cx="${r+8}" cy="${r+8}" r="${r}" fill="${sel?s.color+'33':'#1a1916'}" stroke="${s.color}" stroke-width="${sel?2.5:1.5}" filter="url(#sh)"/>
        <circle cx="${r+8}" cy="${r+8}" r="${sel?11:9}" fill="${s.color}"/>
        <text x="${r+8}" y="${r+12}" text-anchor="middle" font-size="${sel?12:10}" font-weight="800" fill="white" font-family="DM Sans,Arial">${s.num}</text>
        <polygon points="${r+8},${d+8} ${r+2},${d} ${r+14},${d}" fill="${s.color}"/>
      </svg>`),
    scaledSize:new google.maps.Size(d,d+10),
    anchor:new google.maps.Point(r+8,d+8)
  };
}

function drawStops() {
  STOPS.forEach((s)=>{
    const m=new google.maps.Marker({position:{lat:s.lat,lng:s.lng},map,icon:mkStopSvg(s,false),title:s.name,zIndex:100});
    m.addListener('click',()=>selectStop(s.id));
    stopMarkers.push(m);
  });
}

// ═══════════════════════════════════════
// ATTRACTION MARKERS
// ═══════════════════════════════════════
function mkAttrSvg(color,n) {
  return {
    url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
        <defs><filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity=".5"/></filter></defs>
        <circle cx="16" cy="16" r="13" fill="${color}" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" filter="url(#sh)"/>
        <text x="16" y="21" text-anchor="middle" font-size="11" font-weight="800" fill="white" font-family="DM Sans,Arial">${n}</text>
      </svg>`),
    scaledSize:new google.maps.Size(32,32), anchor:new google.maps.Point(16,16)
  };
}

function showAttrMarkers(stop) {
  clearAttrMarkers();
  stop.attrs.forEach((a,i)=>{
    const m=new google.maps.Marker({position:{lat:a.lat,lng:a.lng},map,icon:mkAttrSvg(stop.color,i+1),title:a.name,zIndex:200});
    m.addListener('click',()=>{selectAttr(i); openIW(m,a,stop);});
    attrMarkers.push(m);
  });
}

function clearAttrMarkers(){attrMarkers.forEach(m=>m.setMap(null));attrMarkers=[];infoWindow.close();}

// ═══════════════════════════════════════
// INFO WINDOW — PHOTO CAROUSEL
// ═══════════════════════════════════════
const photoCache={};

function openIW(marker, attr, stop) {
  infoWindow.setContent(buildIWLoading(attr));
  infoWindow.open(map,marker);

  if (photoCache[attr.placeId] !== undefined) {
    buildIWFull(attr, stop, marker, photoCache[attr.placeId]);
    return;
  }
  // Don't bother calling Places API for placeholder IDs
  if (attr.placeId.startsWith('NOID_')) {
    photoCache[attr.placeId] = [];
    buildIWFull(attr, stop, marker, []);
    return;
  }
  placesService.getDetails({placeId:attr.placeId, fields:['photos']}, (r,s)=>{
    let urls=[];
    if (s===google.maps.places.PlacesServiceStatus.OK && r?.photos?.length) {
      urls = r.photos.slice(0,7).map(p=>p.getUrl({maxWidth:560,maxHeight:330}));
    }
    photoCache[attr.placeId]=urls;
    buildIWFull(attr, stop, marker, urls);
  });
}

function buildIWLoading(attr) {
  return `<div class="iw"><div style="width:280px;height:165px;background:#111;display:flex;align-items:center;justify-content:center"><span style="color:rgba(255,255,255,0.2);font-size:11px;font-family:DM Sans,sans-serif">Loading…</span></div><div class="iw-body"><div class="iw-name">${attr.name}</div><div class="iw-day">${attr.day}</div></div></div>`;
}

function buildIWFull(attr, stop, marker, urls) {
  const id='iw'+Date.now();
  const total=urls.length;

  const slides = total>0
    ? urls.map((u,i)=>`<div class="iw-slide"><img class="iw-img" src="${u}" alt="${attr.name} photo ${i+1}" loading="lazy"></div>`).join('')
    : `<div class="iw-slide"><div class="iw-img-placeholder" style="background:${stop.color}22"><span style="font-size:36px">${getAttrEmoji(attr.name)}</span><span style="font-size:11px;color:rgba(255,255,255,0.65);text-align:center;padding:0 16px;line-height:1.4;font-family:'DM Sans',sans-serif">${attr.name}</span><span style="font-size:9px;color:rgba(255,255,255,0.3);text-align:center;padding:0 12px;font-family:'DM Sans',sans-serif">${attr.type}</span></div></div>`;

  const dots = total>1 ? urls.map((_,i)=>`<div class="iw-dot${i===0?' on':''}" onclick="iwGoTo('${id}',${i})"></div>`).join('') : '';
  const counter = total>1 ? `<div class="iw-counter" id="ctr_${id}">1 / ${total}</div>` : '';
  const arrows = total>1 ? `
    <button class="iw-arrow iw-prev" onclick="iwStep('${id}',-1,${total})">&#8249;</button>
    <button class="iw-arrow iw-next" onclick="iwStep('${id}',1,${total})">&#8250;</button>` : '';
  const dotsHtml = dots ? `<div class="iw-dots" id="dots_${id}">${dots}</div>` : '';
  const bkBtn = attr.bookUrl ? `<a href="${attr.bookUrl}" target="_blank" class="iw-btn iw-bk">🎟 Book / Info</a>` : '';

  const html=`<div class="iw">
    <div class="iw-carousel">
      <div class="iw-track" id="trk_${id}">${slides}</div>
      ${arrows}${counter}${dotsHtml}
      <button class="iw-close" onclick="window.closeIW()" aria-label="Close">&#10005;</button>
    </div>
    <div class="iw-body">
      <div class="iw-name">${attr.name}</div>
      <div class="iw-meta">${attr.type}</div>
      <div class="iw-day">${attr.day}</div>
      <div class="iw-stars">${attr.rating}</div>
      <div class="iw-desc">${attr.desc}</div>
      <div class="iw-btns">
        <a href="${attr.mapsUrl}" target="_blank" class="iw-btn iw-gm">📍 Google Maps</a>
        ${bkBtn}
      </div>
    </div>
  </div>`;

  window._setPendingIWId(id);
  infoWindow.setContent(html);
  infoWindow.open(map,marker);
}

// Carousel controls (global — called from inline onclick in info window)
let iwCurrent={};
window.iwStep=function(id,dir,total){
  const cur=(iwCurrent[id]||0);
  const next=(cur+dir+total)%total;
  iwGoTo(id,next);
};
window.iwGoTo=function(id,idx){
  iwCurrent[id]=idx;
  const trk=document.getElementById('trk_'+id);
  const ctr=document.getElementById('ctr_'+id);
  const dotsCont=document.getElementById('dots_'+id);
  if(trk)trk.style.transform=`translateX(-${idx*280}px)`;
  if(ctr){const t=trk?trk.children.length:1;ctr.textContent=`${idx+1} / ${t}`;}
  if(dotsCont){dotsCont.querySelectorAll('.iw-dot').forEach((d,i)=>d.classList.toggle('on',i===idx));}
};

// ── THUMBNAIL FETCH WITH FALLBACK ──
const thumbCache={};

function setThumbFallback(imgEl, color, name) {
  imgEl.style.display = 'none';
  const wrap = imgEl.parentElement;
  wrap.style.background = color + '22';
  const fb = wrap.querySelector('.ac-fb');
  if (fb) fb.style.display = 'flex';
}

function fetchThumb(placeId, imgEl, color, name) {
  if (thumbCache[placeId] !== undefined) {
    if (thumbCache[placeId] === '') {
      setThumbFallback(imgEl, color, name);
    } else {
      imgEl.src = thumbCache[placeId];
    }
    return;
  }
  if (placeId.startsWith('NOID_')) {
    thumbCache[placeId] = '';
    setThumbFallback(imgEl, color, name);
    return;
  }
  placesService.getDetails({placeId, fields:['photos']},(r,s)=>{
    if(s===google.maps.places.PlacesServiceStatus.OK&&r?.photos?.length){
      const u=r.photos[0].getUrl({maxWidth:128,maxHeight:104});
      thumbCache[placeId]=u;
      imgEl.src=u;
    } else {
      thumbCache[placeId]='';
      setThumbFallback(imgEl, color, name);
    }
  });
}

// ═══════════════════════════════════════
// SELECTION
// ═══════════════════════════════════════
function selectStop(id) {
  const stop=STOPS.find(s=>s.id===id); if(!stop)return;
  if(currentStop){
    const pi=STOPS.findIndex(s=>s.id===currentStop.id);
    stopMarkers[pi].setIcon(mkStopSvg(currentStop,false));
  }
  currentStop=stop;
  stopMarkers[STOPS.findIndex(s=>s.id===id)].setIcon(mkStopSvg(stop,true));

  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  const pill=document.getElementById('pill-'+id);
  if(pill)pill.classList.add('active');

  map.panTo({lat:stop.lat,lng:stop.lng});
  setTimeout(()=>map.setZoom(stop.zoom),300);

  showAttrMarkers(stop);
  renderSide(stop);

  clearDirections();
  if(dirOn && stop.walkPath) showWalkingDirections(stop);
}

function goOverview(){
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  if(currentStop){
    stopMarkers[STOPS.findIndex(s=>s.id===currentStop.id)].setIcon(mkStopSvg(currentStop,false));
    currentStop=null;
  }
  clearAttrMarkers(); clearDirections();
  infoWindow.close();
  map.panTo(OV); setTimeout(()=>map.setZoom(5),300);
  document.getElementById('sph').style.display='flex';
  document.getElementById('sideMain').style.display='none';
}

function toggleSat(){
  isSat=!isSat;
  map.setMapTypeId(isSat?'hybrid':'roadmap');
  document.getElementById('btnSat').classList.toggle('on',isSat);
}

function toggleDirections(){
  dirOn=!dirOn;
  document.getElementById('btnWalk').classList.toggle('on',dirOn);
  if(dirOn&&currentStop&&currentStop.walkPath) showWalkingDirections(currentStop);
  else clearDirections();
}

function selectAttr(i){
  if(!currentStop)return;
  const a=currentStop.attrs[i];
  document.querySelectorAll('.acard').forEach(c=>c.classList.remove('active'));
  const card=document.getElementById('ac'+i);
  if(card){card.classList.add('active');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
  map.panTo({lat:a.lat,lng:a.lng});
  if(attrMarkers[i])openIW(attrMarkers[i],a,currentStop);
}

// ═══════════════════════════════════════
// SIDE PANEL
// ═══════════════════════════════════════
function renderSide(stop){
  document.getElementById('sph').style.display='none';
  const sm=document.getElementById('sideMain');
  sm.style.display='flex'; sm.style.flexDirection='column'; sm.style.flex='1'; sm.style.overflow='hidden';

  const tags=stop.tags.map(([l,tc,bg])=>`<span class="stag" style="background:${bg};color:${tc}">${l}</span>`).join('');
  const walkNote = stop.walkPath ? `<div style="font-size:9px;color:${stop.color};margin-top:6px;margin-left:35px;font-weight:600;letter-spacing:0.03em">🚶 ${stop.walkLabel} — toggle "Directions" above</div>` : '';

  sm.innerHTML=`
    <div class="side-hdr">
      <div class="sh-row">
        <div class="sh-badge" style="background:${stop.color}">${stop.num}</div>
        <span class="sh-city" style="color:${stop.color}">${stop.name}</span>
        <span class="sh-country">${stop.country}</span>
      </div>
      <div class="sh-meta">${stop.dates} · ${stop.nights} · <a href="${stop.mapsUrl}" target="_blank">Google Maps ↗</a></div>
      <div class="sh-tags">${tags}</div>
      ${walkNote}
    </div>
    <div class="side-transport"><b>Transport:</b> ${stop.transport}</div>
    <div class="attr-scroll">
      <div class="sec-title">${stop.attrs.length} attractions · tap to open on map</div>
      ${stop.attrs.map((a,i)=>`
        <div class="acard" id="ac${i}" onclick="selectAttr(${i})">
          <div class="ac-num" style="background:${stop.color}">${i+1}</div>
          <div class="ac-thumb-wrap">
            <img class="ac-thumb" id="th${i}" alt="${a.name}">
            <div class="ac-fb">
              <span class="ac-fb-emoji">${getAttrEmoji(a.name)}</span>
              <span class="ac-fb-name">${a.name}</span>
            </div>
          </div>
          <div class="ac-info">
            <div class="ac-name">${a.name}</div>
            <div class="ac-type">${a.type}</div>
            <div class="ac-day" style="color:${stop.color}">${a.day}</div>
            <div class="ac-stars">${a.rating}</div>
            <div class="ac-links">
              <a href="${a.mapsUrl}" target="_blank" class="acl acl-g" onclick="event.stopPropagation()">📍 Maps</a>
              ${a.bookUrl?`<a href="${a.bookUrl}" target="_blank" class="acl acl-b" onclick="event.stopPropagation()">🎟 Book</a>`:''}
            </div>
          </div>
        </div>`).join('')}
    </div>`;

  stop.attrs.forEach((a,i)=>{
    const img=document.getElementById('th'+i);
    if(img) fetchThumb(a.placeId, img, stop.color, a.name);
  });
}

// ═══════════════════════════════════════
// BUILD TOP BAR UI
// ═══════════════════════════════════════
function buildUI(){
  const pc=document.getElementById('pills');
  const rb=document.getElementById('routeBar');
  const segs=['🚂','🚐','✈','🚐','✈'];
  STOPS.forEach((s,i)=>{
    const p=document.createElement('div');
    p.className='pill'; p.id='pill-'+s.id;
    p.style.cssText=`background:${s.bg};color:${s.tc};border-color:${s.color};--c:${s.color}`;
    p.textContent=`${s.num} ${s.name}`; p.onclick=()=>selectStop(s.id);
    pc.appendChild(p);

    const rs=document.createElement('div'); rs.className='rb-stop';
    const dot=document.createElement('div'); dot.className='rb-dot';
    dot.style.background=s.color; dot.textContent=s.num; dot.onclick=()=>selectStop(s.id);
    const nm=document.createElement('div'); nm.className='rb-name';
    nm.style.color=s.tc; nm.textContent=s.name; nm.onclick=()=>selectStop(s.id);
    rs.appendChild(dot); rs.appendChild(nm); rb.appendChild(rs);

    if(i<STOPS.length-1){
      const ar=document.createElement('div'); ar.className='rb-seg';
      ar.textContent=` ${segs[i]} `; rb.appendChild(ar);
    }
  });
}
</script>
